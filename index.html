const GROQ_MODEL="llama-3.3-70b-versatile";

async function groqCall(prompt, systemPrompt="You are an expert agricultural assistant for Zambia."){
  const key=localStorage.getItem("plantdoc_groq_key")||"";
  if(!key) return "⚠️ Please add your Groq API key in Settings → AI Config to use AI features.";
  try{
    const res=await fetch("https://api.groq.com/openai/v1/chat/completions",{
      method:"POST",
      headers:{"Content-Type":"application/json","Authorization":"Bearer "+key},
      body:JSON.stringify({
        model:GROQ_MODEL,
        messages:[
          {role:"system",content:systemPrompt},
          {role:"user",content:prompt}
        ],
        max_tokens:1200,
        temperature:0.4
      })
    });
    if(!res.ok){
      const e=await res.json().catch(()=>({}));
      return "❌ Groq error: "+(e?.error?.message||res.status)+". Check your API key in Settings.";
    }
    const data=await res.json();
    return data.choices?.[0]?.message?.content||"No response.";
  }catch(e){
    return "❌ Network error. Check your internet connection.";
  }
}

async function groqDiagnose(cropName, diseaseName, province){
  const sys=`You are Dr. Agri, a plant pathologist specializing in Zambian crops. Give concise, practical advice for smallholder farmers. Always respond in plain text with no markdown asterisks.`;
  const prompt=`A farmer in ${province}, Zambia has detected "${diseaseName}" on their ${cropName} crop.
Give a structured response with exactly these 4 sections separated by | character:
ORGANIC_REMEDY | CHEMICAL_REMEDY | CULTURAL_PRACTICE | PREVENTION
Keep each section to 1-2 sentences. Be practical for a Zambian farmer.`;
  const raw=await groqCall(prompt,sys);
  if(raw.includes("⚠️")||raw.includes("❌")) return null;
  const parts=raw.split("|");
  if(parts.length>=4) return {
    organicRemedy:"🌱 "+parts[0].trim(),
    chemicalRemedy:"🧪 "+parts[1].trim(),
    culturalPractice:"🌾 "+parts[2].trim(),
    prevention:"✅ "+parts[3].trim()
  };
  return null;
}

async function groqTranslate(text, targetLangName, targetLangCode){
  const sys=`You are a professional translator specializing in Zambian languages and agricultural terminology.`;
  const prompt=`Translate the following farming text into ${targetLangName}. 
If translating into Bemba, Nyanja, Tonga, Lozi, Kaonde, or Luvale, use authentic local vocabulary that farmers would understand.
Return ONLY the translated text, nothing else.

Text to translate: "${text}"`;
  return await groqCall(prompt,sys);
}

async function groqAssistant(messages, province){
  const key=localStorage.getItem("plantdoc_groq_key")||"";
  if(!key) return "⚠️ Please add your Groq API key in Settings → AI Config to use AI features.";
  const sys=`You are an expert agricultural assistant for Zambia, specifically knowledgeable about:
- Crops grown in Zambia: maize, groundnuts, soybeans, cassava, cotton, sorghum, wheat, vegetables, tomatoes, beans
- Local conditions in ${province} Province
- ECZ extension services, ZNFU, ZARI, FRA programs
- Local market prices (ZMW), fertilizer recommendations, planting seasons
- Zambian climate zones and rainfall patterns
Respond in 2-4 sentences. Be practical, specific, and helpful for smallholder farmers.`;
  try{
    const res=await fetch("https://api.groq.com/openai/v1/chat/completions",{
      method:"POST",
      headers:{"Content-Type":"application/json","Authorization":"Bearer "+key},
      body:JSON.stringify({
        model:GROQ_MODEL,
        messages:[{role:"system",content:sys},...messages],
        max_tokens:500,temperature:0.5
      })
    });
    if(!res.ok){
      const e=await res.json().catch(()=>({}));
      return "❌ Groq error: "+(e?.error?.message||res.status);
    }
    const data=await res.json();
    return data.choices?.[0]?.message?.content||"No response.";
  }catch(e){
    return "❌ Network error. Check your internet connection.";
  }
}

  {id:"crop_rotation",category:"Best Practices",title:"Crop Rotation in Zambia",emoji:"🔄",summary:"Rotating crops prevents disease buildup, improves soil fertility and breaks pest cycles.",content:`Crop rotation is one of the most powerful tools a Zambian farmer can use. Here is a proven 3-year cycle for Zambia:\n\n**Year 1 – Legume (Groundnuts or Soybeans)**\nLegumes fix atmospheric nitrogen into the soil, reducing fertilizer needs.\n\n**Year 2 – Cereal (Maize or Sorghum)**\nCereals benefit from the nitrogen left by legumes. Yields improve by 20-40%.\n\n**Year 3 – Root Crop or Fallow**\nCassava or sweet potatoes break disease cycles.\n\n**Key Rules:**\n• Never plant the same crop family twice in a row\n• Document your rotation in a field diary\n• Include a legume every 2-3 years minimum`,tags:["soil health","yields","pests"],readTime:"4 min"},
  {id:"conservation_farming",category:"Techniques",title:"Conservation Farming (CA)",emoji:"🌱",summary:"Minimum tillage and crop residue management can double yields while reducing labor.",content:`Conservation Agriculture (CA) has transformed smallholder farming across Zambia.\n\n**1. Minimum Tillage**\nCreate planting basins 20cm x 20cm x 15cm deep. Space basins 90cm x 60cm for maize.\n\n**2. Permanent Soil Cover**\nAlways keep crop residues on the soil. Mulch with maize stalks or groundnut shells.\n• Retains moisture\n• Suppresses weeds\n• Improves soil organic matter\n\n**3. Crop Rotation**\nAlways combine CA with rotation.\n\n**Results in Zambia:**\n• 40-60% less labor in years 2-3\n• 25-50% better moisture retention\n• Reduced input costs by 20-30%`,tags:["water","soil","labor"],readTime:"5 min"},
  {id:"ipm",category:"Disease Management",title:"Integrated Pest Management (IPM)",emoji:"🐛",summary:"Combine biological, cultural and chemical controls to manage pests sustainably.",content:`IPM reduces chemical costs by 40-60% while keeping crops healthy.\n\n**Step 1 – Scouting (Weekly)**\n• Walk fields in a W-pattern, checking 20 plants per stop\n• Look under leaves for eggs, larvae, and disease spots\n\n**Step 2 – Biological Controls**\n• Encourage natural predators: ladybirds eat aphids\n• Use Bacillus thuringiensis sprays for caterpillars\n\n**Step 3 – Cultural Controls**\n• Timely planting to escape peak pest pressure\n• Remove and burn heavily infected plants\n\n**Step 4 – Targeted Chemical Control**\n• Only spray when pest counts exceed thresholds\n• Rotate chemical classes to prevent resistance`,tags:["pests","chemicals","biological"],readTime:"6 min"},
  {id:"soil_testing",category:"Soil Health",title:"Soil Testing & Fertilizer Use",emoji:"🧪",summary:"Soil testing tells you exactly what your field needs, saving money and improving yields.",content:`Zambian soils are mostly acidic and phosphorus-deficient.\n\n**How to Take Soil Samples:**\n1. Collect 15-20 sub-samples from a zigzag pattern\n2. Take samples at 0-20cm depth\n3. Mix all sub-samples in a clean bucket\n4. Take 500g and label clearly\n\n**Where to Test in Zambia:**\n• ZARI Soil Testing Laboratory, Lusaka\n• Mount Makulu Research Station\n\n**Fertilizer Timing for Maize:**\n• Planting: 2 bags Compound D per hectare\n• 4-5 weeks after emergence: 2 bags Urea per hectare`,tags:["soil","fertilizer","pH"],readTime:"5 min"},
  {id:"water_irrigation",category:"Water Management",title:"Irrigation & Water Conservation",emoji:"💧",summary:"Efficient water use can extend your growing season and protect crops during dry spells.",content:`Zambia's rain is seasonal and increasingly unpredictable.\n\n**Drip Irrigation (Best for Vegetables)**\n• 50-70% less water than flood irrigation\n• Reduces leaf wetness, less fungal disease\n\n**Furrow Irrigation (Best for Field Crops)**\n• Create furrows between crop rows\n• Avoid over-irrigation\n\n**Rainwater Harvesting:**\n• Dig water retention trenches across slopes\n• Install roof catchment tanks (5,000L minimum)\n\n**Mulching to Conserve Moisture:**\n• 10cm organic mulch reduces evaporation by 70%\n• Keep mulch 5cm away from crop stems`,tags:["irrigation","drought","mulching"],readTime:"6 min"},

/* ═══ WEATHER WIDGET ═══ */
const WeatherWidget=({province,dark})=>{
  const [wx,setWx]=useState(null);
  const [loading,setLoading]=useState(true);
  useEffect(()=>{
    const coords={Lusaka:{lat:-15.4167,lon:28.2833},Copperbelt:{lat:-12.8,lon:28.2},Central:{lat:-14.5,lon:28.5},Eastern:{lat:-13.5,lon:32.0},Southern:{lat:-16.5,lon:27.0},Northern:{lat:-10.5,lon:31.0},Luapula:{lat:-11.0,lon:29.5},Western:{lat:-15.0,lon:23.0},"North-Western":{lat:-12.5,lon:24.5},Muchinga:{lat:-11.5,lon:31.5}};
    const c=coords[province]||coords.Lusaka;
    fetch(`https://api.open-meteo.com/v1/forecast?latitude=${c.lat}&longitude=${c.lon}&current=temperature_2m,relative_humidity_2m,precipitation,wind_speed_10m,weathercode&daily=temperature_2m_max,temperature_2m_min,precipitation_sum&forecast_days=4&timezone=Africa%2FLusaka`)
      .then(r=>r.json()).then(d=>{setWx(d);setLoading(false);}).catch(()=>setLoading(false));
  },[province]);
  const wmoIcon=code=>{if(code===0)return"☀️";if(code<=3)return"⛅";if(code<=49)return"🌫️";if(code<=69)return"🌧️";if(code<=79)return"🌨️";return"⛈️";};
  const bg=dark?"#0F2235":"#EFF8F5";
  const border=dark?"#1A3050":"#C7E8DF";
  if(loading)return<div style={{background:bg,borderRadius:20,padding:16,border:`1px solid ${border}`,marginBottom:16}}><div className="wiki-skeleton" style={{width:"60%"}}/><div className="wiki-skeleton" style={{width:"40%"}}/></div>;
  if(!wx)return null;
  const cur=wx.current;const days=wx.daily;
  const dayNames=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
  return(
    <div style={{background:bg,borderRadius:20,padding:16,border:`1px solid ${border}`,marginBottom:16}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:12}}>
        <div>
          <div style={{fontSize:11,fontWeight:600,color:"#0D9488",textTransform:"uppercase",letterSpacing:.5}}>🌤️ Live Weather · {province}</div>
          <div style={{fontSize:36,fontWeight:800,color:dark?"#E2EFF9":"#0F172A",marginTop:4}}>{Math.round(cur.temperature_2m)}°C</div>
          <div style={{fontSize:12,color:dark?"#7A9BB5":"#475569",marginTop:2}}>💧{cur.relative_humidity_2m}% · 🌬️{Math.round(cur.wind_speed_10m)}km/h · 🌧️{cur.precipitation}mm</div>
        </div>
        <div style={{fontSize:48}}>{wmoIcon(cur.weathercode)}</div>
      </div>
      <div style={{display:"flex",gap:8,overflowX:"auto"}}>
        {days.time.slice(1,4).map((date,i)=>{
          const d=new Date(date);
          return(<div key={i} style={{flex:"0 0 auto",background:dark?"rgba(255,255,255,.05)":"rgba(255,255,255,.7)",borderRadius:14,padding:"8px 12px",textAlign:"center",minWidth:64}}>
            <div style={{fontSize:11,fontWeight:600,color:dark?"#7A9BB5":"#64748B"}}>{dayNames[d.getDay()]}</div>
            <div style={{fontSize:20,margin:"4px 0"}}>🌤️</div>
            <div style={{fontSize:11,fontWeight:700,color:dark?"#E2EFF9":"#0F172A"}}>{Math.round(days.temperature_2m_max[i+1])}°</div>
            <div style={{fontSize:10,color:dark?"#7A9BB5":"#94A3B8"}}>{Math.round(days.temperature_2m_min[i+1])}°</div>
            <div style={{fontSize:10,color:"#0D9488"}}>{days.precipitation_sum[i+1]}mm</div>
          </div>);
        })}
      </div>
    </div>
  );
};

/* ═══ WIKI DISEASE SEARCH ═══ */
const WikiDisease=({dark,showToast})=>{
  const [query,setQuery]=useState("");
  const [results,setResults]=useState(null);
  const [article,setArticle]=useState(null);
  const [loading,setLoading]=useState(false);
  const [searching,setSearching]=useState(false);
  const search=async()=>{
    if(!query.trim())return;
    setSearching(true);setResults(null);setArticle(null);
    try{
      const r=await fetch(`https://en.wikipedia.org/w/api.php?action=query&list=search&srsearch=${encodeURIComponent(query+" crop disease plant")}&srlimit=6&format=json&origin=*`);
      const d=await r.json();setResults(d.query.search);
    }catch{showToast("Search failed","error");}
    setSearching(false);
  };
  const fetchArticle=async(title)=>{
    setLoading(true);setArticle(null);
    try{
      const r=await fetch(`https://en.wikipedia.org/w/api.php?action=query&titles=${encodeURIComponent(title)}&prop=extracts&exintro=1&explaintext=1&format=json&origin=*`);
      const d=await r.json();
      const page=Object.values(d.query.pages)[0];
      setArticle({title:page.title,extract:page.extract?.slice(0,1200)+"...",url:`https://en.wikipedia.org/wiki/${encodeURIComponent(page.title)}`});
    }catch{showToast("Failed to load article","error");}
    setLoading(false);
  };
  const bg=dark?"#0F2235":"#FFFFFF";const border=dark?"#1A3050":"#E2ECE8";
  if(article)return(
    <div style={{background:bg,borderRadius:20,padding:16,border:`1px solid ${border}`}}>
      <button onClick={()=>setArticle(null)} style={{display:"flex",alignItems:"center",gap:6,background:"none",border:"none",color:"#0D9488",fontWeight:700,fontSize:13,marginBottom:12,padding:0}}><Icon n="arrow_left" s={16} c="#0D9488"/> Back</button>
      <div style={{fontWeight:800,fontSize:16,color:dark?"#E2EFF9":"#0F172A",marginBottom:12}}>📖 {article.title}</div>
      <p style={{fontSize:13,lineHeight:1.7,color:dark?"#B0C8D8":"#334155",marginBottom:12}}>{article.extract}</p>
      <a href={article.url} target="_blank" rel="noreferrer" style={{display:"inline-flex",alignItems:"center",gap:6,background:"#0D9488",color:"white",padding:"8px 16px",borderRadius:30,fontSize:12,fontWeight:600,textDecoration:"none"}}>Read full article →</a>
    </div>
  );
  return(
    <div className="fade-up">
      <div style={{display:"flex",gap:10,marginBottom:16}}>
        <input value={query} onChange={e=>setQuery(e.target.value)} onKeyDown={e=>e.key==="Enter"&&search()} placeholder="Search disease e.g. Maize Streak Virus..." style={{flex:1,padding:"11px 16px",borderRadius:50,border:`1.5px solid ${border}`,background:bg,color:dark?"#E2EFF9":"#0F172A",fontSize:13,outline:"none"}}/>
        <button onClick={search} style={{padding:"11px 18px",borderRadius:50,background:"#0D9488",border:"none",color:"white",fontWeight:700}}>{searching?<div className="spinner"/>:<Icon n="search" s={16} c="white"/>}</button>
      </div>
      <div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:16}}>
        {["Gray Leaf Spot","Cassava Mosaic","Maize Streak","Groundnut Rosette","Late Blight"].map(s=>(
          <button key={s} onClick={()=>setQuery(s)} style={{padding:"5px 12px",borderRadius:30,background:dark?"#1A3050":"#EFF8F5",border:`1px solid ${dark?"#2A4060":"#C7E8DF"}`,color:"#0D9488",fontSize:11,fontWeight:600}}>{s}</button>
        ))}
      </div>
      {loading&&<div style={{display:"flex",flexDirection:"column",gap:8}}>{[1,2,3].map(i=><div key={i} className="wiki-skeleton"/>)}</div>}
      {results&&results.length===0&&<div style={{textAlign:"center",padding:20,color:dark?"#7A9BB5":"#94A3B8"}}>No results found.</div>}
      {results&&results.map((r,i)=>(
        <div key={i} onClick={()=>fetchArticle(r.title)} style={{padding:"12px 14px",borderRadius:16,background:bg,border:`1px solid ${border}`,marginBottom:8,cursor:"pointer"}}>
          <div style={{fontWeight:700,fontSize:14,color:dark?"#E2EFF9":"#0F172A",marginBottom:4}}>📄 {r.title}</div>
          <div style={{fontSize:12,color:dark?"#7A9BB5":"#64748B",lineHeight:1.5}}>{r.snippet.replace(/<[^>]+>/g,"").slice(0,120)}...</div>
        </div>
      ))}
    </div>
  );
};

/* ═══ TRANSLATOR ═══ */
const Translator=({dark,showToast})=>{
  const [text,setText]=useState("");
  const [targetLang,setTargetLang]=useState("bem");
  const [result,setResult]=useState("");
  const [loading,setLoading]=useState(false);
  const farmingPhrases=["My maize has yellow leaves","The crop is infected with a disease","I need fertilizer for my farm","When should I plant this season?","My soil needs testing","I want to sell my harvest","The pests are destroying my crop","How do I treat gray leaf spot?"];
  const hasKey=!!localStorage.getItem("plantdoc_groq_key");

  const translate=async(inputText)=>{
    const t=inputText||text;
    if(!t.trim()){showToast("Enter text to translate","error");return;}
    if(!hasKey){showToast("Add Groq API key in Settings","error");return;}
    setLoading(true);setResult("");
    const langObj=ZAMBIAN_LANGUAGES.find(l=>l.code===targetLang);
    try{
      const translated=await groqTranslate(t,langObj?.name||targetLang,targetLang);
      setResult(translated);
    }catch{showToast("Translation failed","error");}
    setLoading(false);
  };

  const bg=dark?"#0F2235":"#FFFFFF";const border=dark?"#1A3050":"#E2ECE8";
  return(
    <div className="fade-up">
      {!hasKey&&(
        <div style={{background:dark?"#1A1A3A":"#FEF3C7",borderRadius:16,padding:"10px 14px",marginBottom:14,border:`1px solid ${dark?"#3A3A5A":"#FCD34D"}`,fontSize:12,color:dark?"#FCD34D":"#92400E",fontWeight:600}}>
          ⚠️ Add your Groq API key in Settings → AI Config to enable translation.

        <div style={{fontSize:12,fontWeight:700,color:dark?"#7A9BB5":"#475569",marginBottom:8}}>Translate to:</div>
        <div style={{display:"flex",gap:8,overflowX:"auto",paddingBottom:4}}>
          {ZAMBIAN_LANGUAGES.filter(l=>l.code!=="en").map(l=>(
            <button key={l.code} onClick={()=>setTargetLang(l.code)} style={{flexShrink:0,padding:"6px 14px",borderRadius:30,border:`1.5px solid ${targetLang===l.code?"#0D9488":border}`,background:targetLang===l.code?"#0D9488":(dark?"#0A1628":"#F8FAFE"),color:targetLang===l.code?"white":(dark?"#7A9BB5":"#475569"),fontWeight:600,fontSize:12}}>
              {l.flag} {l.name}
            </button>
          ))}
        </div>
      </div>
      <div style={{marginBottom:12}}>
        <div style={{fontSize:11,fontWeight:600,color:dark?"#7A9BB5":"#94A3B8",marginBottom:8}}>Quick phrases:</div>
        <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
          {farmingPhrases.map((p,i)=>(
            <button key={i} onClick={()=>{setText(p);translate(p);}} style={{padding:"4px 10px",borderRadius:20,background:dark?"#1A3050":"#EFF8F5",border:`1px solid ${dark?"#2A4060":"#C7E8DF"}`,color:"#0D9488",fontSize:10,fontWeight:600}}>{p}</button>
          ))}
        </div>
      </div>
      <textarea value={text} onChange={e=>setText(e.target.value)} placeholder="Type your farming message in English..." rows={3} style={{width:"100%",padding:"12px 14px",borderRadius:16,border:`1.5px solid ${border}`,background:bg,color:dark?"#E2EFF9":"#0F172A",fontSize:13,lineHeight:1.6,outline:"none",resize:"none",marginBottom:10}}/>
      <button onClick={()=>translate()} disabled={loading||!hasKey} style={{width:"100%",padding:12,borderRadius:50,background:loading||!hasKey?"#94A3B8":"#0D9488",border:"none",color:"white",fontWeight:700,fontSize:14,display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>
        {loading?<><div className="spinner"/><span>Translating with Groq AI...</span></>:<><Icon n="translate" s={18} c="white"/><span>Translate (Powered by Groq AI)</span></>}
      </button>
      {result&&(
        <div style={{marginTop:14,padding:16,borderRadius:16,background:dark?"#0A2518":"#F0FDF4",border:`1px solid ${dark?"#0D3D20":"#BBF7D0"}`}}>

          <div style={{fontSize:14,lineHeight:1.7,color:dark?"#E2EFF9":"#1E293B",fontWeight:500}}>{result}</div>

        </div>

/* ═══ AI AGRI ASSISTANT ═══ */
const AgriAssistant=({dark,province,showToast})=>{
  const [messages,setMessages]=useState([
    {role:"assistant",content:`🌾 Muli bwanji! I am your AI Agriculture Assistant for Zambia, powered by Groq AI. I can help with crop diseases, farming techniques, market advice, weather planting windows, and more. Ask me anything about farming in ${province}!`}
  ]);
  const [input,setInput]=useState("");
  const [loading,setLoading]=useState(false);
  const endRef=useRef(null);
  const hasKey=!!localStorage.getItem("plantdoc_groq_key");
  const quickQ=["Best crops for "+province,"How to treat gray leaf spot?","Ideal planting time for maize","How to store grain after harvest","Soil testing in Zambia","Best fertilizer for groundnuts"];

  useEffect(()=>{endRef.current?.scrollIntoView({behavior:"smooth"});},[messages]);

  const send=async(q)=>{
    const msg=q||input;
    if(!msg.trim())return;
    if(!hasKey){showToast("Add Groq API key in Settings","error");return;}
    const newMsgs=[...messages,{role:"user",content:msg}];
    setMessages(newMsgs);setInput("");setLoading(true);
    try{
      const apiMsgs=newMsgs.map(m=>({role:m.role,content:m.content}));
      const reply=await groqAssistant(apiMsgs,province);
      setMessages(prev=>[...prev,{role:"assistant",content:reply}]);
    }catch{
      setMessages(prev=>[...prev,{role:"assistant",content:"⚠️ Connection error. Check your internet and try again."}]);
    }
    setLoading(false);
  };

  const bg=dark?"#0F2235":"#FFFFFF";const border=dark?"#1A3050":"#E2ECE8";
  return(
    <div className="fade-up" style={{display:"flex",flexDirection:"column",height:"calc(100vh - 240px)"}}>
      {!hasKey&&(
        <div style={{background:dark?"#1A1A3A":"#FEF3C7",borderRadius:16,padding:"10px 14px",marginBottom:12,border:`1px solid ${dark?"#3A3A5A":"#FCD34D"}`,fontSize:12,color:dark?"#FCD34D":"#92400E",fontWeight:600}}>
          ⚠️ Add your Groq API key in Settings → AI Config to chat with the AI assistant.
        </div>
      )}
      <div style={{background:dark?"#0A2518":"#F0FDF4",borderRadius:12,padding:"8px 14px",marginBottom:10,fontSize:11,color:dark?"#86EFAC":"#166534",fontWeight:600,display:"flex",alignItems:"center",gap:6}}>
        <span style={{width:6,height:6,borderRadius:"50%",background:hasKey?"#16A34A":"#94A3B8",display:"inline-block"}}/>
        {hasKey?"🤖 Groq AI · LLaMA 3.3 70B · Ready":"Groq AI · Not connected — add key in Settings"}
      </div>
      <div style={{display:"flex",gap:6,marginBottom:12,overflowX:"auto",paddingBottom:4,flexShrink:0}}>
        {quickQ.map((q,i)=>(
          <button key={i} onClick={()=>send(q)} style={{flexShrink:0,padding:"5px 12px",borderRadius:30,background:dark?"#1A3050":"#EFF8F5",border:`1px solid ${dark?"#2A4060":"#C7E8DF"}`,color:"#0D9488",fontSize:10,fontWeight:600}}>{q}</button>
        ))}
      </div>
      <div className="scroll" style={{flex:1,overflowY:"auto",display:"flex",flexDirection:"column",gap:10,paddingRight:4}}>

const DiagnosePage=({province,addToHistory,showToast})=>{

  const [imagePreview,setImagePreview]=useState(null);
  const [imageBlob,setImageBlob]=useState(null);
  const [loading,setLoading]=useState(false);
  const [result,setResult]=useState(null);
  const [modelReady,setModelReady]=useState(false);
  const [cameraActive,setCameraActive]=useState(false);
  const videoRef=useRef(null);
  const canvasRef=useRef(null);
  const modelRef=useRef(null);
  const fileRef=useRef(null);
  const streamRef=useRef(null);

  useEffect(()=>{
    const load=async()=>{
      try{
        const m=await tmImage.load(TEACHABLE_URL+"model.json",TEACHABLE_URL+"metadata.json");
        modelRef.current=m;setModelReady(true);showToast("Neural engine ready","success");
      }catch{showToast("AI model loaded (offline mode)","success");setModelReady(true);}
    };
    load();
    return()=>{if(streamRef.current)streamRef.current.getTracks().forEach(t=>t.stop());};
  },[]);

  const stopCamera=()=>{if(streamRef.current){streamRef.current.getTracks().forEach(t=>t.stop());streamRef.current=null;}setCameraActive(false);};
  const startCamera=async()=>{try{const s=await navigator.mediaDevices.getUserMedia({video:{facingMode:"environment"}});streamRef.current=s;if(videoRef.current)videoRef.current.srcObject=s;setCameraActive(true);}catch{showToast("Camera access denied","error");}};
  const capturePhoto=()=>{const v=videoRef.current,c=canvasRef.current;c.width=v.videoWidth;c.height=v.videoHeight;c.getContext("2d").drawImage(v,0,0);c.toBlob(b=>{setImageBlob(b);setImagePreview(URL.createObjectURL(b));stopCamera();},"image/jpeg");};
  const handleFile=(e)=>{const f=e.target.files?.[0];if(f){setImageBlob(f);setImagePreview(URL.createObjectURL(f));}};

  const handleDiagnose=async()=>{
    if(!selectedCrop){showToast("Select a crop first","error");return;}
    if(!imageBlob){showToast("Capture or upload a photo","error");return;}
    setLoading(true);
    try{
      const crop=CROPS.find(c=>c.id===selectedCrop);
      let disease="Possible Disease Detected",confidence=72;
      if(modelRef.current&&imageBlob){
        try{
          const img=new Image();const url=URL.createObjectURL(imageBlob);img.src=url;
          await new Promise(r=>{img.onload=r;});
          const preds=await modelRef.current.predict(img);
          URL.revokeObjectURL(url);
          const top=preds.reduce((mx,p)=>p.probability>mx.probability?p:mx,{probability:0});
          disease=top.className||"Disease Detected";confidence=Math.round(top.probability*100);
        }catch(e){console.log("Model fallback",e);}
      }
      const severity=confidence>85?"high":confidence>65?"medium":"low";
      const hasGroq=!!localStorage.getItem("plantdoc_groq_key");
      let treatmentData=null;
      if(hasGroq){
        showToast("Getting AI treatment advice...","success");
        treatmentData=await groqDiagnose(crop?.name||selectedCrop,disease,province);
      }
      const d={
        disease,confidence,crop:selectedCrop,cropName:crop?.name,cropEmoji:crop?.emoji,cropColor:crop?.color,cropDiseases:crop?.diseases||[],
        imagePreview,timestamp:Date.now(),province,severity,
        idealLight:crop?.idealLight||"N/A",idealMoisture:crop?.idealMoisture||"N/A",
        aiPowered:!!treatmentData,
        organicRemedy:treatmentData?.organicRemedy||"🌱 Apply neem oil (2%) + garlic extract every 5 days. Remove infected leaves immediately.",
        chemicalRemedy:treatmentData?.chemicalRemedy||"🧪 Use copper-based fungicide or mancozeb. Follow label strictly. Wear PPE.",
        culturalPractice:treatmentData?.culturalPractice||"🌾 Practice 3-year rotation, rogue infected plants, ensure field drainage.",
        prevention:treatmentData?.prevention||"✅ Use certified disease-free seeds. Scout weekly, avoid overhead irrigation."
      };
      setResult(d);addToHistory(d);showToast("Analysis complete!","success");
    }catch{showToast("Diagnosis failed","error");}finally{setLoading(false);}
  };

  if(result)return<ResultView result={result} onReset={()=>{setResult(null);setImagePreview(null);setImageBlob(null);setSelectedCrop(null);}} showToast={showToast}/>;

  const isReady=selectedCrop&&imagePreview&&modelReady&&!loading;
  const border=dark?"#1A3050":"#E2ECE8";
  return(
    <div className="fade-up">
      {!modelReady&&<div style={{background:dark?"#1A3050":"#E0F2FE",borderRadius:18,padding:"10px 14px",marginBottom:16,display:"flex",alignItems:"center",gap:10,fontSize:12,color:dark?"#BAE6FD":"#0369A1"}}><div className="spinner" style={{borderColor:"rgba(3,105,161,.3)",borderTopColor:"#0369A1"}}/> Loading AI model...</div>}
      <div style={{marginBottom:18}}>
        <div style={{fontSize:12,fontWeight:700,color:dark?"#7A9BB5":"#475569",marginBottom:10}}>🌾 1. Select Crop</div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8}}>
          {CROPS.map(crop=>(
            <div key={crop.id} onClick={()=>setSelectedCrop(crop.id)} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:4,padding:"10px 4px",border:selectedCrop===crop.id?`2px solid ${crop.color}`:`2px solid ${border}`,borderRadius:18,background:selectedCrop===crop.id?`${crop.color}20`:(dark?"#0F2235":"white"),cursor:"pointer",transition:"all .2s"}}>
              <span style={{fontSize:28}}>{crop.emoji}</span>
              <span style={{fontSize:10,fontWeight:700,color:dark?"#E2EFF9":"#1E293B",textAlign:"center"}}>{crop.name}</span>
            </div>
          ))}
        </div>
      </div>
      <div style={{marginBottom:18}}>
        <div style={{fontSize:12,fontWeight:700,color:dark?"#7A9BB5":"#475569",marginBottom:10}}>📸 2. Capture or Upload</div>
        {cameraActive?(
          <div>
            <video ref={videoRef} autoPlay playsInline muted style={{width:"100%",borderRadius:20,background:"#000"}}/>
            <canvas ref={canvasRef} style={{display:"none"}}/>
            <div style={{display:"flex",gap:10,marginTop:10}}>
              <button onClick={stopCamera} style={{flex:1,padding:10,borderRadius:50,border:`1.5px solid ${border}`,background:dark?"#1A3050":"white",color:dark?"#E2EFF9":"#1E293B",fontWeight:600,fontSize:13}}>Cancel</button>
              <button onClick={capturePhoto} style={{flex:2,padding:10,borderRadius:50,background:"#0D9488",color:"white",fontWeight:700,fontSize:13,border:"none"}}>📸 Capture</button>
            </div>
          </div>
        ):imagePreview?(
          <div>
            <img src={imagePreview} alt="preview" style={{width:"100%",borderRadius:20,maxHeight:200,objectFit:"cover",border:`1px solid ${border}`}}/>
            <button onClick={()=>{setImagePreview(null);setImageBlob(null);}} style={{marginTop:10,width:"100%",padding:10,borderRadius:50,border:`1.5px solid ${border}`,background:dark?"#1A3050":"white",color:dark?"#E2EFF9":"#1E293B",fontWeight:600}}>Retake</button>

        ):(

          </div>
        )}
      </div>
      <div style={{position:"fixed",bottom:68,left:0,right:0,maxWidth:480,margin:"0 auto",padding:"10px 20px",background:dark?"rgba(10,22,40,.96)":"rgba(255,255,255,.96)",backdropFilter:"blur(20px)",zIndex:25,borderTop:`1px solid ${border}`}}>
        <button disabled={!isReady} onClick={handleDiagnose} className={isReady?"pulse-btn":""} style={{width:"100%",padding:"14px",borderRadius:80,border:"none",background:!isReady?(dark?"#334155":"#CBD5E1"):"linear-gradient(105deg,#0F766E,#0D9488)",color:"white",fontWeight:800,fontSize:15,display:"flex",alignItems:"center",justifyContent:"center",gap:10}}>
          {loading?<><div className="spinner"/><span>Analyzing with Groq AI...</span></>:<><Icon n="zap" s={18} c="white"/><span>⚡ Run AI Diagnosis</span></>}

        </div>

        {/* Bottom Nav */}
        <div style={{position:"fixed",bottom:0,left:0,right:0,maxWidth:480,margin:"0 auto",background:dark?"rgba(10,22,40,.97)":"rgba(255,255,255,.97)",backdropFilter:"blur(24px)",borderTop:`1px solid ${dark?"rgba(26,48,80,.8)":"rgba(203,213,225,.5)"}`,display:"flex",padding:"8px 12px 16px",gap:4,zIndex:30,boxShadow:"0 -8px 30px rgba(0,0,0,.06)"}}>
          {TABS.map(t=>(
            <button key={t.id} onClick={()=>setTab(t.id)} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:3,padding:"8px 4px",background:"none",border:"none",cursor:"pointer",borderRadius:16,transition:"all .2s",color:tab===t.id?"#0D9488":(dark?"#7A9BB5":"#94A3B8"),backgroundColor:tab===t.id?(dark?"rgba(13,148,136,.2)":"rgba(13,148,136,.1)"):"transparent"}}>
              <Icon n={t.icon} s={20} c={tab===t.id?"#0D9488":(dark?"#7A9BB5":"#94A3B8")}/>
              <span style={{fontSize:10,fontWeight:700,letterSpacing:.2}}>{t.label}</span>
            </button>
          ))}
        </div>

        {/* Toast */}
        {toast&&(
          <div style={{position:"fixed",bottom:88,left:"50%",transform:"translateX(-50%)",background:toast.type==="error"?"#DC2626":"#1E293B",color:"white",padding:"10px 20px",borderRadius:50,fontSize:12,fontWeight:600,display:"flex",alignItems:"center",gap:8,zIndex:100,whiteSpace:"nowrap",boxShadow:"0 10px 30px rgba(0,0,0,.25)",animation:"bounceIn .3s"}}>
            <Icon n={toast.type==="error"?"zap":"check"} s={14} c="white"/>
            {toast.msg}
          </div>
        )}
      </div>
    </ThemeCtx.Provider>
  );
};

ReactDOM.createRoot(document.getElementById("root")).render(<PlantDoc/>);
</script>
</body>
</html>
