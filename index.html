<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>PlantDoc Pro | AI Precision Agriculture Zambia</title>
    <script src="https://cdn.jsdelivr.net/npm/react@18.2.0/umd/react.development.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/react-dom@18.2.0/umd/react-dom.development.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            font-family: 'Inter', sans-serif;
            background: #F1F5F9;
            overflow: hidden;
            position: fixed;
            width: 100%;
            height: 100%;
        }
        #root {
            width: 100%;
            height: 100%;
            position: relative;
        }
        .scrollable::-webkit-scrollbar {
            width: 4px;
        }
        .scrollable::-webkit-scrollbar-track {
            background: #E2E8F0;
            border-radius: 4px;
        }
        .scrollable::-webkit-scrollbar-thumb {
            background: #0D9488;
            border-radius: 4px;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes pulseGlow {
            0% { box-shadow: 0 0 0 0 rgba(13,148,136,0.5); }
            70% { box-shadow: 0 0 0 12px rgba(13,148,136,0); }
            100% { box-shadow: 0 0 0 0 rgba(13,148,136,0); }
        }
        @keyframes subtleRise {
            from { transform: scale(0.96); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
        .fade-in {
            animation: fadeInUp 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }
        .card-hover {
            transition: all 0.25s ease;
        }
        .card-hover:active {
            transform: scale(0.98);
        }
        .diagnose-ready {
            animation: pulseGlow 1.8s infinite;
        }
        .glass-panel {
            background: rgba(255,255,255,0.8);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.5);
        }
    </style>
</head>
<body>
    <div id="root"></div>
    
    <script type="text/babel">
        const { useState, useRef, useEffect, useCallback } = React;

        // Enhanced Crop Database with unique vibrant colors, emojis, and expanded disease libraries
        const CROPS = [
            { id: "maize", name: "Maize", emoji: "🌽", color: "#F59E0B", iconSvg: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 2v20M7 4l5 2 5-2M7 10l5 2 5-2M7 16l5 2 5-2M4 12h16"/><path d="M8 4v12M16 4v12"/></svg>', diseases: ["Gray Leaf Spot", "Maize Streak Virus", "Northern Corn Leaf Blight", "Rust (Puccinia sorghi)", "Stalk Rot", "Ear Rot"] },
            { id: "groundnuts", name: "Groundnuts", emoji: "🥜", color: "#B45309", iconSvg: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><ellipse cx="12" cy="14" rx="6" ry="8"/><path d="M6 6c0-2 2-4 6-4s6 2 6 4"/></svg>', diseases: ["Rosette Disease", "Early Leaf Spot (Cercospora)", "Late Leaf Spot", "Groundnut Rust", "Aflatoxin Contamination", "Bacterial Wilt"] },
            { id: "soybean", name: "Soybean", emoji: "🫘", color: "#65A30D", iconSvg: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 2v4M6 8l2-2M18 8l-2-2M8 20h8M12 12v8"/><ellipse cx="12" cy="12" rx="8" ry="3"/></svg>', diseases: ["Soybean Mosaic Virus", "Sudden Death Syndrome", "Phytophthora Root Rot", "Asian Soybean Rust", "Frogeye Leaf Spot", "White Mold"] },
            { id: "cotton", name: "Cotton", emoji: "🌾", color: "#3B82F6", iconSvg: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 2v6M12 16v6M4 12h6M14 12h6"/><circle cx="12" cy="12" r="3"/></svg>', diseases: ["Bacterial Blight", "Fusarium Wilt", "Bollworm", "Cotton Leaf Curl Virus", "Verticillium Wilt", "Alternaria Leaf Spot"] },
            { id: "cassava", name: "Cassava", emoji: "🍠", color: "#D97706", iconSvg: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 2v10M8 8l4 2 4-2M6 14h12"/><path d="M8 22l4-2 4 2"/></svg>', diseases: ["Cassava Mosaic Disease (CMD)", "Cassava Brown Streak (CBSD)", "Root Rot", "Anthracnose", "Bacterial Blight", "Green Mite Damage"] },
            { id: "tomato", name: "Tomato", emoji: "🍅", color: "#DC2626", iconSvg: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 2c2 0 4 2 4 4 0 1-1 2-2 2h-4c-1 0-2-1-2-2 0-2 2-4 4-4z"/><path d="M12 6c-3 0-6 2-6 5s3 5 6 5 6-2 6-5-3-5-6-5z"/><path d="M9 12c0 1 1 2 3 2s3-1 3-2"/></svg>', diseases: ["Early Blight", "Late Blight", "Tomato Yellow Leaf Curl Virus", "Septoria Leaf Spot", "Bacterial Spot", "Fusarium Wilt"] },
            { id: "lemon", name: "Lemon", emoji: "🍋", color: "#EAB308", iconSvg: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><ellipse cx="12" cy="14" rx="8" ry="7"/><path d="M12 7c-3 0-6 2-6 5s3 5 6 5 6-2 6-5-3-5-6-5z"/><path d="M12 12l2-2"/><path d="M12 2v3"/></svg>', diseases: ["Citrus Canker", "Citrus Greening (Huanglongbing)", "Lemon Scab", "Sooty Mold", "Phytophthora Root Rot", "Anthracnose"] },
            { id: "avocado", name: "Avocado", emoji: "🥑", color: "#16A34A", iconSvg: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><ellipse cx="12" cy="14" rx="7" ry="6"/><circle cx="12" cy="14" r="2.5"/><path d="M12 8c0-2 2-4 4-4s4 2 4 4"/><path d="M12 8c0-2-2-4-4-4S4 6 4 8"/></svg>', diseases: ["Avocado Root Rot", "Avocado Sunblotch", "Anthracnose", "Cercospora Spot", "Laurel Wilt", "Powdery Mildew"] },
            { id: "beans", name: "Beans", emoji: "🫘", color: "#15803D", iconSvg: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><ellipse cx="12" cy="12" rx="5" ry="8"/><path d="M12 4v8"/></svg>', diseases: ["Bean Common Mosaic Virus", "Angular Leaf Spot", "Rust (Uromyces)", "Anthracnose", "Halo Blight", "Charcoal Rot"] },
            { id: "wheat", name: "Wheat", emoji: "🌾", color: "#D6A356", iconSvg: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 2v20M8 6l4-2 4 2M8 12l4-2 4 2"/></svg>', diseases: ["Stem Rust (Black Rust)", "Yellow Rust (Stripe Rust)", "Leaf Rust (Brown Rust)", "Septoria Tritici Blotch", "Fusarium Head Blight", "Powdery Mildew"] }
        ];

        const ZAMBIAN_PROVINCES = ["Lusaka", "Copperbelt", "Central", "Eastern", "Southern", "Northern", "Luapula", "Western", "North-Western", "Muchinga"];
        const TEACHABLE_MODEL_URL = "https://teachablemachine.withgoogle.com/models/drdcQS-r_/";

        const AIProviderIcons = {
            openai: '<svg viewBox="0 0 24 24" fill="none"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2z" fill="#10A37F"/><path d="M12 6v6l4 2" stroke="white" stroke-width="1.5" fill="none"/><circle cx="12" cy="12" r="2" fill="white"/></svg>',
            anthropic: '<svg viewBox="0 0 24 24" fill="none"><path d="M12 2L2 7l10 5 10-5-10-5z" fill="#7C3AED"/><path d="M2 17l10 5 10-5" stroke="#7C3AED" stroke-width="2" fill="none"/><path d="M2 12l10 5 10-5" stroke="#7C3AED" stroke-width="2" fill="none"/></svg>',
            gemini: '<svg viewBox="0 0 24 24" fill="none"><path d="M12 2L15 9H22L16 14L19 21L12 16L5 21L8 14L2 9H9L12 2Z" fill="#4285F4" stroke="none"/></svg>',
            teachable: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 2v4M4 12H2M22 12h-2M12 22v-4M6 6L4 8M20 8l-2-2"/><circle cx="12" cy="12" r="4"/></svg>'
        };

        const Icon = ({ name, size = 22, color = "currentColor", svgContent = null, strokeWidth = 2 }) => {
            const icons = {
                camera: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth={strokeWidth} strokeLinecap="round" strokeLinejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>,
                history: <svg width={size} height={size} fill="none" stroke={color} strokeWidth="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>,
                settings: <svg width={size} height={size} fill="none" stroke={color} strokeWidth="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>,
                zap: <svg width={size} height={size} fill="none" stroke={color} strokeWidth="2" viewBox="0 0 24 24"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>,
                brain: <svg width={size} height={size} fill="none" stroke={color} strokeWidth="2" viewBox="0 0 24 24"><path d="M12 4a4 4 0 0 1 3.5 6A4 4 0 0 1 12 18a4 4 0 0 1-3.5-6A4 4 0 0 1 12 4z"/><path d="M12 2v2M12 20v2"/></svg>,
                check: <svg width={size} height={size} fill="none" stroke={color} strokeWidth="2.5" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>,
                share: <svg width={size} height={size} fill="none" stroke={color} strokeWidth="2" viewBox="0 0 24 24"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/></svg>,
                key: <svg width={size} height={size} fill="none" stroke={color} strokeWidth="2" viewBox="0 0 24 24"><path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4"/></svg>,
                leaf: <svg width={size} height={size} fill="none" stroke={color} strokeWidth="2" viewBox="0 0 24 24"><path d="M12 2L9 7h6l-3-5z"/><path d="M12 7v12"/><path d="M8 12h8"/></svg>,
                location: <svg width={size} height={size} fill="none" stroke={color} strokeWidth="2" viewBox="0 0 24 24"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>,
                speaker: <svg width={size} height={size} fill="none" stroke={color} strokeWidth="2" viewBox="0 0 24 24"><path d="M3 9h4l5-4v14l-5-4H3V9z"/><path d="M18 9a5 5 0 0 1 0 6"/></svg>
            };
            if (svgContent) return <div style={{ width: size, height: size, color: color }} dangerouslySetInnerHTML={{ __html: svgContent }} />;
            return icons[name] || null;
        };

        // Main App Component
        const PlantDocZambia = () => {
            const [activeTab, setActiveTab] = useState("diagnose");
            const [history, setHistory] = useState(() => { try { return JSON.parse(localStorage.getItem("plantdoc_history") || "[]"); } catch { return []; } });
            const [settings, setSettings] = useState(() => ({ province: "Lusaka", saveLocation: true, activeAI: "teachable", apiKeys: { openai: "", anthropic: "", gemini: "" } }));
            const [toast, setToast] = useState(null);
            const showToast = useCallback((msg, type = "success") => { setToast({ msg, type }); setTimeout(() => setToast(null), 2500); }, []);

            const addToHistory = useCallback((entry) => {
                const updated = [entry, ...history].slice(0, 50);
                setHistory(updated);
                localStorage.setItem("plantdoc_history", JSON.stringify(updated));
            }, [history]);

            return (
                <div style={{ display: "flex", flexDirection: "column", height: "100vh", width: "100%", background: "#F8FAFE", overflow: "hidden" }}>
                    <div style={{ background: "linear-gradient(135deg, #0B5E54 0%, #0D9488 100%)", padding: "20px 24px", flexShrink: 0, zIndex: 20, boxShadow: "0 6px 14px rgba(0,0,0,0.08)" }}>
                        <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between" }}>
                            <div style={{ display: "flex", alignItems: "center", gap: 14 }}>
                                <div style={{ width: 48, height: 48, background: "rgba(255,255,255,0.2)", borderRadius: 20, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 24, backdropFilter: "blur(6px)" }}>🌾</div>
                                <div>
                                    <div style={{ fontSize: 20, fontWeight: 800, color: "white", letterSpacing: -0.5 }}>PlantDoc Pro</div>
                                    <div style={{ fontSize: 10, fontWeight: 600, color: "rgba(255,255,255,0.85)", textTransform: "uppercase", letterSpacing: 0.5 }}>Zambia · Multi-AI Precision Agriculture</div>
                                </div>
                            </div>
                            <div style={{ background: "rgba(255,255,255,0.2)", padding: "6px 14px", borderRadius: 40, fontSize: 12, fontWeight: 600, color: "white", backdropFilter: "blur(4px)" }}>🇿🇲 ZM</div>
                        </div>
                    </div>

                    <div className="scrollable" style={{ flex: 1, overflowY: "auto", overflowX: "hidden", padding: "20px 20px 160px 20px" }}>
                        {activeTab === "diagnose" && <DiagnosePage province={settings.province} addToHistory={addToHistory} showToast={showToast} apiKeys={settings.apiKeys} activeAI={settings.activeAI} />}
                        {activeTab === "history" && <HistoryPage history={history} setHistory={setHistory} showToast={showToast} />}
                        {activeTab === "settings" && <SettingsPage settings={settings} saveSettings={setSettings} showToast={showToast} />}
                    </div>

                    <div style={{ position: "fixed", bottom: 0, left: 0, right: 0, maxWidth: 480, margin: "0 auto", background: "rgba(255,255,255,0.96)", backdropFilter: "blur(20px)", borderTop: "1px solid rgba(203,213,225,0.5)", display: "flex", padding: "8px 24px 16px", gap: 16, zIndex: 30, boxShadow: "0 -8px 25px rgba(0,0,0,0.04)" }}>
                        {[
                            { id: "diagnose", icon: "camera", label: "Diagnose" },
                            { id: "history", icon: "history", label: "History" },
                            { id: "settings", icon: "settings", label: "Settings" }
                        ].map(tab => (
                            <button key={tab.id} onClick={() => setActiveTab(tab.id)} style={{ flex: 1, display: "flex", flexDirection: "column", alignItems: "center", gap: 5, padding: "10px 12px", background: "none", border: "none", cursor: "pointer", fontFamily: "Inter", borderRadius: 20, transition: "all 0.2s ease", color: activeTab === tab.id ? "#0D9488" : "#94A3B8", backgroundColor: activeTab === tab.id ? "rgba(13,148,136,0.12)" : "transparent" }}>
                                <Icon name={tab.icon} size={22} />
                                <span style={{ fontSize: 11, fontWeight: 600, letterSpacing: 0.3 }}>{tab.label}</span>
                            </button>
                        ))}
                    </div>

                    {toast && (
                        <div style={{ position: "fixed", bottom: 90, left: "50%", transform: "translateX(-50%)", background: "#1E293B", color: "white", padding: "10px 20px", borderRadius: 60, fontSize: 13, fontWeight: 500, display: "flex", alignItems: "center", gap: 10, zIndex: 100, whiteSpace: "nowrap", boxShadow: "0 10px 25px -5px rgba(0,0,0,0.1)", pointerEvents: "none" }}>
                            <Icon name="check" size={16} color="#10B981" />
                            {toast.msg}
                        </div>
                    )}
                </div>
            );
        };

        // Diagnose Page - With Emojis on Crop Cards
        const DiagnosePage = ({ province, addToHistory, showToast }) => {
            const [selectedCrop, setSelectedCrop] = useState(null);
            const [imagePreview, setImagePreview] = useState(null);
            const [imageBlob, setImageBlob] = useState(null);
            const [loading, setLoading] = useState(false);
            const [result, setResult] = useState(null);
            const [modelReady, setModelReady] = useState(false);
            const [cameraActive, setCameraActive] = useState(false);
            const videoRef = useRef(null);
            const canvasRef = useRef(null);
            const modelRef = useRef(null);
            const fileRef = useRef(null);
            const streamRef = useRef(null);

            useEffect(() => {
                const loadModel = async () => {
                    try {
                        const model = await tmImage.load(TEACHABLE_MODEL_URL + "model.json", TEACHABLE_MODEL_URL + "metadata.json");
                        modelRef.current = model;
                        setModelReady(true);
                        showToast("Neural engine ready", "success");
                    } catch (err) {
                        console.error(err);
                        showToast("Model load failed, using fallback", "error");
                    }
                };
                loadModel();
                return () => { if (streamRef.current) streamRef.current.getTracks().forEach(t => t.stop()); };
            }, []);

            const stopCamera = () => { if (streamRef.current) { streamRef.current.getTracks().forEach(t => t.stop()); streamRef.current = null; } setCameraActive(false); };
            const startCamera = async () => { try { const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } }); streamRef.current = stream; if (videoRef.current) videoRef.current.srcObject = stream; setCameraActive(true); } catch { showToast("Camera access denied", "error"); } };
            const capturePhoto = () => { const video = videoRef.current; const canvas = canvasRef.current; canvas.width = video.videoWidth; canvas.height = video.videoHeight; canvas.getContext("2d").drawImage(video, 0, 0); canvas.toBlob(blob => { setImageBlob(blob); setImagePreview(URL.createObjectURL(blob)); stopCamera(); }, "image/jpeg"); };
            const handleFileUpload = (e) => { const file = e.target.files?.[0]; if (file) { setImageBlob(file); setImagePreview(URL.createObjectURL(file)); } };

            const runDiagnosis = async () => {
                if (!modelRef.current) throw new Error("Model not ready");
                const img = new Image();
                const url = URL.createObjectURL(imageBlob);
                img.src = url;
                await new Promise(r => { img.onload = r; });
                const predictions = await modelRef.current.predict(img);
                URL.revokeObjectURL(url);
                const top = predictions.reduce((max, p) => p.probability > max.probability ? p : max, { probability: 0 });
                const disease = top.className || "Possible Infection Detected";
                const confidence = Math.round(top.probability * 100);
                const severity = confidence > 85 ? "high" : confidence > 65 ? "medium" : "low";
                const crop = CROPS.find(c => c.id === selectedCrop);
                return {
                    disease, confidence, crop: selectedCrop, cropName: crop?.name, cropEmoji: crop?.emoji, cropColor: crop?.color, cropSvg: crop?.iconSvg, cropDiseases: crop?.diseases || [],
                    imagePreview, timestamp: Date.now(), province, severity,
                    organicRemedy: "🌱 Apply neem oil (2%) + garlic extract every 5 days. Remove infected leaves and improve soil aeration.",
                    chemicalRemedy: "🧪 Use copper-based fungicide or systemic treatment. Follow label strictly. Wear protective equipment.",
                    culturalPractice: "🌾 Practice 3-year rotation, rogue infected plants, ensure field drainage, and clean tools.",
                    prevention: "✅ Use certified disease-free seeds. Scout weekly, avoid overhead irrigation, maintain spacing, and apply balanced nutrition."
                };
            };

            const handleDiagnose = async () => {
                if (!selectedCrop) { showToast("Select a crop first", "error"); return; }
                if (!imageBlob) { showToast("Capture or upload a photo", "error"); return; }
                if (!modelReady) { showToast("AI model loading...", "error"); return; }
                setLoading(true);
                try {
                    const diagnosis = await runDiagnosis();
                    setResult(diagnosis);
                    addToHistory(diagnosis);
                    showToast("Analysis complete!", "success");
                } catch (err) { showToast("Diagnosis failed", "error"); } finally { setLoading(false); }
            };

            if (result) return <ResultView result={result} onReset={() => { setResult(null); setImagePreview(null); setImageBlob(null); setSelectedCrop(null); }} showToast={showToast} />;

            const isReady = selectedCrop && imagePreview && modelReady && !loading;
            return (
                <div className="fade-in">
                    {!modelReady && <div style={{ background: "#E0F2FE", borderRadius: 20, padding: "12px 16px", marginBottom: 20, display:"flex", alignItems:"center", gap:12, fontSize:13 }}><div style={{ width:16, height:16, border:"2px solid #BAE6FD", borderTopColor:"#0D9488", borderRadius:"50%", animation:"spin 0.6s linear infinite" }}></div> Loading AI model...</div>}
                    
                    <div style={{ marginBottom: 24 }}>
                        <div style={{ fontSize: 13, fontWeight: 700, color: "#1E293B", letterSpacing: 0.5, marginBottom: 14 }}>🌾 1. Select Crop</div>
                        <div style={{ display: "grid", gridTemplateColumns: "repeat(3, 1fr)", gap: 12 }}>
                            {CROPS.map(crop => (
                                <div key={crop.id} onClick={() => setSelectedCrop(crop.id)} style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: 8, padding: "12px 6px", border: selectedCrop === crop.id ? `2px solid ${crop.color}` : "2px solid #E9EEF3", borderRadius: 24, background: selectedCrop === crop.id ? `rgba(${parseInt(crop.color.slice(1,3),16)},${parseInt(crop.color.slice(3,5),16)},${parseInt(crop.color.slice(5,7),16)},0.08)` : "white", cursor: "pointer", transition: "all 0.2s", boxShadow: selectedCrop === crop.id ? "0 6px 12px -8px rgba(0,0,0,0.1)" : "none" }}>
                                    <div style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: 6 }}>
                                        <span style={{ fontSize: 32 }}>{crop.emoji}</span>
                                        <div style={{ width: 28, height: 28, color: crop.color }} dangerouslySetInnerHTML={{ __html: crop.iconSvg }} />
                                    </div>
                                    <span style={{ fontSize: 12, fontWeight: 600, color: "#1E293B" }}>{crop.name}</span>
                                </div>
                            ))}
                        </div>
                    </div>

                    <div style={{ marginBottom: 24 }}>
                        <div style={{ fontSize: 13, fontWeight: 700, color: "#1E293B", marginBottom: 14 }}>📸 2. Capture or Upload</div>
                        {cameraActive ? (
                            <div><video ref={videoRef} autoPlay playsInline muted style={{ width: "100%", borderRadius: 28, background: "#000", border: "1px solid #E2E8F0" }} /><canvas ref={canvasRef} style={{ display: "none" }} /><div style={{ display: "flex", gap: 12, marginTop: 16 }}><button onClick={stopCamera} style={{ flex:1, padding: 12, borderRadius: 60, border:"1.5px solid #CBD5E1", background:"white", fontWeight:600, fontSize:14 }}>Cancel</button><button onClick={capturePhoto} style={{ flex:2, padding: 12, borderRadius: 60, background:"#0D9488", color:"white", fontWeight:700, fontSize:14, border:"none" }}>Capture</button></div></div>
                        ) : imagePreview ? (
                            <div><img src={imagePreview} alt="preview" style={{ width: "100%", borderRadius: 28, maxHeight: 240, objectFit: "cover", border: "1px solid #E2E8F0", boxShadow: "0 8px 20px rgba(0,0,0,0.05)" }} /><button onClick={() => { setImagePreview(null); setImageBlob(null); }} style={{ marginTop: 14, width: "100%", padding: 12, borderRadius: 60, border:"1.5px solid #E2E8F0", background:"white", fontWeight:600, cursor:"pointer" }}>Retake Photo</button></div>
                        ) : (
                            <div onClick={() => fileRef.current?.click()} style={{ border: "2px dashed #CBD5E1", borderRadius: 32, background: "#FFFFFF", padding: "32px 20px", textAlign: "center", cursor: "pointer", transition: "all 0.2s", boxShadow: "0 2px 8px rgba(0,0,0,0.02)" }}>
                                <input ref={fileRef} type="file" accept="image/*" onChange={handleFileUpload} style={{ display: "none" }} />
                                <div style={{ marginBottom: 12, display: "flex", justifyContent: "center" }}><Icon name="camera" size={48} color="#0D9488" strokeWidth={1.5} /></div>
                                <div style={{ fontSize: 15, fontWeight: 600, marginBottom: 6, color: "#1E293B" }}>Upload plant image</div>
                                <div style={{ fontSize: 12, color: "#64748B", marginBottom: 14 }}>JPG, PNG up to 10MB</div>
                                <button onClick={(e) => { e.stopPropagation(); startCamera(); }} style={{ background: "#0D9488", border: "none", padding: "10px 24px", borderRadius: 60, fontWeight: 600, fontSize: 13, color: "white", cursor: "pointer", boxShadow: "0 2px 6px rgba(13,148,136,0.3)" }}>📷 Open Camera</button>
                            </div>
                        )}
                    </div>

                    <div style={{ position: "fixed", bottom: 70, left: 0, right: 0, maxWidth: 480, margin: "0 auto", padding: "12px 20px", background: "rgba(255,255,255,0.96)", backdropFilter: "blur(20px)", zIndex: 25, borderTop: "1px solid rgba(226,232,240,0.6)" }}>
                        <button disabled={!isReady} onClick={handleDiagnose} className={isReady ? "diagnose-ready" : ""} style={{ width: "100%", padding: "16px", borderRadius: 80, border: "none", background: !isReady ? "#CBD5E1" : "linear-gradient(105deg, #0F766E, #0D9488)", color: "white", fontWeight: 800, fontSize: 16, cursor: !isReady ? "not-allowed" : "pointer", display: "flex", alignItems: "center", justifyContent: "center", gap: 12, transition: "all 0.2s", boxShadow: !isReady ? "none" : "0 12px 28px -8px rgba(13,148,136,0.5)" }}><Icon name="zap" size={20} />{loading ? "Analyzing..." : "⚡ Run AI Diagnosis"}</button>
                    </div>
                    <div style={{ height: 90 }} />
                    {loading && <div style={{ position:"fixed", inset:0, background:"rgba(255,255,255,0.96)", display:"flex", alignItems:"center", justifyContent:"center", flexDirection:"column", zIndex:100 }}><div style={{ width:52, height:52, border:"4px solid #E2E8F0", borderTopColor:"#0D9488", borderRadius:"50%", animation:"spin 0.7s linear infinite" }}></div><div style={{ marginTop:20, fontWeight:600, fontSize:15, color:"#0F766E" }}>Scanning leaf patterns...</div></div>}
                </div>
            );
        };

        // Result View with Voice + Enhanced UI (showing crop emoji)
        const ResultView = ({ result, onReset, showToast }) => {
            const [treatTab, setTreatTab] = useState("organic");
            const [isSpeaking, setIsSpeaking] = useState(false);
            const speechRef = useRef(null);

            const speakDiagnosis = () => {
                if (!window.speechSynthesis) { showToast("Voice not supported", "error"); return; }
                if (speechRef.current) window.speechSynthesis.cancel();
                const text = `Diagnosis: ${result.disease} with ${result.confidence} percent confidence. Affected crop: ${result.cropName}. Severity: ${result.severity}. Organic remedy: ${result.organicRemedy}. Chemical control: ${result.chemicalRemedy}. Cultural practices: ${result.culturalPractice}. Prevention tips: ${result.prevention}. Other common diseases for ${result.cropName} include: ${result.cropDiseases?.join(", ")}.`;
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = "en-US";
                utterance.rate = 0.9;
                utterance.onstart = () => setIsSpeaking(true);
                utterance.onend = () => setIsSpeaking(false);
                utterance.onerror = () => { setIsSpeaking(false); showToast("Voice error", "error"); };
                window.speechSynthesis.speak(utterance);
                speechRef.current = utterance;
            };

            const stopSpeaking = () => { if (window.speechSynthesis) window.speechSynthesis.cancel(); setIsSpeaking(false); };

            return (
                <div className="fade-in" style={{ animation: "subtleRise 0.3s ease" }}>
                    <div style={{ background: `linear-gradient(135deg, ${result.cropColor || "#0F766E"}E6, ${result.cropColor || "#0D9488"})`, borderRadius: 32, padding: 24, marginBottom: 24, color: "white", boxShadow: "0 16px 30px -12px rgba(0,0,0,0.2)" }}>
                        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
                            <div><div style={{ fontSize: 26, fontWeight: 800, letterSpacing: -0.6, marginBottom: 8 }}>{result.disease}</div><div style={{ opacity: 0.9, fontSize: 14, fontWeight: 500 }}>{result.cropEmoji || "🌱"} {result.cropName} · {result.province}</div></div>
                            <button onClick={isSpeaking ? stopSpeaking : speakDiagnosis} style={{ background: "rgba(255,255,255,0.25)", border: "none", borderRadius: 60, width: 48, height: 48, display: "flex", alignItems: "center", justifyContent: "center", cursor: "pointer", backdropFilter: "blur(8px)" }}><Icon name="speaker" size={26} color="white" /></button>
                        </div>
                        <div style={{ marginTop: 18, display: "flex", justifyContent: "space-between", alignItems: "center" }}><span style={{ fontWeight: 500 }}>Confidence: {result.confidence}%</span><span style={{ background: "rgba(0,0,0,0.25)", padding: "4px 14px", borderRadius: 40, fontSize: 12, fontWeight: 700 }}>{result.severity.toUpperCase()} severity</span></div>
                        <div style={{ height: 8, background: "rgba(0,0,0,0.2)", borderRadius: 10, marginTop: 14, overflow: "hidden" }}><div style={{ width: `${result.confidence}%`, height: "100%", background: "white", borderRadius: 10 }} /></div>
                    </div>

                    {result.cropDiseases && result.cropDiseases.length > 0 && (
                        <div style={{ background: "#FFFFFF", borderRadius: 28, padding: 20, marginBottom: 24, border: "1px solid #EEF2F8", boxShadow: "0 8px 20px rgba(0,0,0,0.02)" }}>
                            <div style={{ fontSize: 14, fontWeight: 700, color: "#0F766E", marginBottom: 12 }}>📋 Disease atlas · {result.cropName}</div>
                            <div style={{ display: "flex", flexWrap: "wrap", gap: 10 }}>
                                {result.cropDiseases.map((d, idx) => <span key={idx} style={{ background: "#F1F5F9", padding: "5px 14px", borderRadius: 40, fontSize: 12, fontWeight: 500, color: "#1E293B" }}>{d}</span>)}
                            </div>
                            <div style={{ fontSize: 12, color: "#64748B", marginTop: 14, borderTop: "1px solid #E2E8F0", paddingTop: 12 }}>⚠️ Primary detected: <strong style={{ color: result.cropColor }}>{result.disease}</strong> — immediate action recommended.</div>
                        </div>
                    )}

                    <div style={{ background: "white", borderRadius: 28, padding: 22, marginBottom: 24, boxShadow: "0 8px 20px rgba(0,0,0,0.02)" }}>
                        <div style={{ fontSize: 14, fontWeight: 700, color: "#1E293B", marginBottom: 16 }}>📌 Treatment protocol</div>
                        <div style={{ display: "flex", gap: 10, marginBottom: 22 }}>
                            {["organic","chemical","cultural"].map(tab => <button key={tab} onClick={() => setTreatTab(tab)} style={{ padding: "7px 20px", borderRadius: 60, border: "1.5px solid #E2E8F0", background: treatTab===tab ? "#0D9488" : "white", color: treatTab===tab ? "white" : "#475569", fontWeight: 700, fontSize: 13, cursor:"pointer", transition: "all 0.2s" }}>{tab.charAt(0).toUpperCase()+tab.slice(1)}</button>)}
                        </div>
                        <div style={{ fontSize: 15, lineHeight: 1.5, color: "#1E293B", padding: "4px 0" }}>{treatTab === "organic" ? result.organicRemedy : treatTab === "chemical" ? result.chemicalRemedy : result.culturalPractice}</div>
                    </div>

                    <div style={{ background: "#F0FDF4", borderRadius: 28, padding: 20, marginBottom: 24, borderLeft: "6px solid #0D9488" }}><div style={{ fontSize: 14, fontWeight: 700, color: "#0F766E" }}>🛡️ Prevention & best practice</div><div style={{ marginTop: 10, fontSize: 14, lineHeight:1.45 }}>{result.prevention}</div></div>

                    <div style={{ display: "flex", gap: 14, marginBottom: 20 }}>
                        <button onClick={() => { if (navigator.share) navigator.share({ title: `PlantDoc: ${result.disease}`, text: `Detected ${result.disease} on ${result.cropName}` }); else showToast("Share not supported", "default"); }} style={{ flex:1, padding:"14px", borderRadius:60, border:"1.5px solid #E2E8F0", background:"white", fontWeight:600, cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"center", gap:8 }}><Icon name="share" size={16} /> Share</button>
                        <button onClick={onReset} style={{ flex:2, padding:"14px", borderRadius:60, border:"none", background:"#0D9488", color:"white", fontWeight:700, cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"center", gap:8 }}><Icon name="camera" size={16} /> New scan</button>
                    </div>
                </div>
            );
        };

        const HistoryPage = ({ history, setHistory, showToast }) => {
            const [selected, setSelected] = useState(null);
            if (selected) return <div><button onClick={() => setSelected(null)} style={{ marginBottom:20, color:"#0D9488", fontWeight:700, background:"none", border:"none", cursor:"pointer", fontSize:15, display:"flex", alignItems:"center", gap:6 }}>← Back to History</button><ResultView result={selected} onReset={()=>setSelected(null)} showToast={showToast} /></div>;
            if (!history.length) return <div style={{ textAlign:"center", padding:"60px 20px" }}><div style={{ fontSize:70, marginBottom:16 }}>📋</div><div style={{ fontWeight:800, fontSize:18, marginBottom:6 }}>No diagnoses yet</div><div style={{ color:"#64748B", fontSize:14 }}>Run your first AI scan to see results</div></div>;
            return (<div><div style={{ display:"flex", justifyContent:"space-between", marginBottom:18 }}><span style={{ fontWeight:700, color:"#1E293B", fontSize:13 }}>Recent scans ({history.length})</span><button onClick={()=>{ if(confirm("Clear all history?")){ setHistory([]); localStorage.setItem("plantdoc_history","[]"); showToast("History cleared","success"); } }} style={{ color:"#EF4444", background:"none", border:"none", fontSize:13, fontWeight:500 }}>Clear all</button></div>{history.map(entry=><div key={entry.timestamp} onClick={()=>setSelected(entry)} style={{ display:"flex", gap:16, padding:"14px 0", borderBottom:"1px solid #EDF2F7", cursor:"pointer", transition:"0.1s" }}><img src={entry.imagePreview} style={{ width:64, height:64, borderRadius:24, objectFit:"cover", background:"#F1F5F9" }} /><div><div style={{ fontWeight:700, fontSize:15 }}>{entry.disease}</div><div style={{ fontSize:13, color:"#475569", marginTop:2 }}>{entry.cropEmoji || "🌾"} {entry.cropName} · {entry.confidence}%</div><div style={{ fontSize:11, color:"#94A3B8", marginTop:4 }}>{new Date(entry.timestamp).toLocaleDateString()}</div></div></div>)}</div>);
        };

        const SettingsPage = ({ settings, saveSettings, showToast }) => {
            const [localSettings, setLocalSettings] = useState(settings);
            const [showKeys, setShowKeys] = useState({ openai: false, anthropic: false, gemini: false });
            const updateSetting = (key, value) => { const updated = { ...localSettings, [key]: value }; setLocalSettings(updated); saveSettings(updated); showToast(`${key} updated`, "success"); };
            const updateApiKey = (provider, value) => { const updated = { ...localSettings, apiKeys: { ...localSettings.apiKeys, [provider]: value } }; setLocalSettings(updated); saveSettings(updated); showToast(`${provider} key saved`, "success"); };
            return (<div className="fade-in"><div style={{ background:"white", borderRadius:32, padding:24, marginBottom:20, boxShadow:"0 2px 8px rgba(0,0,0,0.02)" }}><div style={{ fontWeight:800, marginBottom:16, fontSize:15 }}>🧠 AI Engine</div><select value={localSettings.activeAI} onChange={e=>updateSetting("activeAI", e.target.value)} style={{ width:"100%", padding:14, borderRadius:24, border:"1.5px solid #E2E8F0", fontWeight:500, fontSize:14 }}><option value="teachable">🌿 Teachable Machine (Pre-configured)</option><option value="openai">🤖 OpenAI GPT-4</option><option value="anthropic">🧠 Anthropic Claude</option><option value="gemini">⭐ Google Gemini</option></select></div><div style={{ background:"white", borderRadius:32, padding:24, marginBottom:20 }}><div style={{ fontWeight:800, marginBottom:16, fontSize:15 }}>🔐 API Keys</div>{["openai","anthropic","gemini"].map(prov=> (<div key={prov} style={{ marginBottom:18 }}><div dangerouslySetInnerHTML={{ __html: AIProviderIcons[prov] }} style={{ width:28, height:28, marginBottom:8 }} /><input type={showKeys[prov]?"text":"password"} placeholder={`${prov} API key`} value={localSettings.apiKeys[prov]} onChange={e=>updateApiKey(prov, e.target.value)} style={{ width:"100%", padding:12, borderRadius:20, border:"1.5px solid #E2E8F0", fontSize:13, fontFamily:"monospace" }} /><button onClick={()=>setShowKeys({...showKeys, [prov]:!showKeys[prov]})} style={{ marginTop:8, fontSize:12, background:"none", border:"none", color:"#0D9488", cursor:"pointer" }}>{showKeys[prov]?"Hide":"Show"}</button></div>))}</div><div style={{ background:"white", borderRadius:32, padding:24, marginBottom:20 }}><div style={{ fontWeight:800, marginBottom:14, fontSize:15 }}>📍 Location</div><select value={localSettings.province} onChange={e=>updateSetting("province", e.target.value)} style={{ width:"100%", padding:14, borderRadius:24, border:"1.5px solid #E2E8F0", fontSize:14 }}>{ZAMBIAN_PROVINCES.map(p=><option key={p}>{p} Province</option>)}</select></div><div style={{ textAlign:"center", fontSize:12, color:"#94A3B8", padding:"24px 0 12px" }}>PlantDoc Pro v5.0 · AI for Zambian Farmers</div></div>);
        };

        ReactDOM.createRoot(document.getElementById("root")).render(<PlantDocZambia />);
    </script>
</body>
</html>
