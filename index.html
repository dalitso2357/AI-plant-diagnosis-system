        // Main App Component
        const PlantDocZambia = () => {
            const [tab, setTab] = useState("diagnose");
            const [history, setHistory] = useState(() => {
                try { return JSON.parse(localStorage.getItem("plantdoc_history") || "[]"); } catch { return []; }
            });
            const [settings, setSettings] = useState(() => {
                try { 
                    return JSON.parse(localStorage.getItem("plantdoc_settings") || JSON.stringify({ 
                        province: "Lusaka", 
                        saveLocation: true,
                        aiModel: "teachable",
                        openaiKey: "",
                        anthropicKey: "",
                        geminiKey: ""
                    })); 
                } catch { 
                    return { 
                        province: "Lusaka", 
                        saveLocation: true,
                        aiModel: "teachable",
                        openaiKey: "",
                        anthropicKey: "",
                        geminiKey: ""
                    }; 
                }
            });
            const [toast, setToast] = useState(null);

            const showToast = useCallback((msg, type = "default") => {
                setToast({ msg, type });
                setTimeout(() => setToast(null), 3000);
            }, []);

            const addToHistory = useCallback((entry) => {
                setHistory(prev => {
                    const updated = [entry, ...prev].slice(0, 50);
                    localStorage.setItem("plantdoc_history", JSON.stringify(updated));
                    return updated;
                });
            }, []);

            const saveSettings = useCallback((s) => {
                setSettings(s);
                localStorage.setItem("plantdoc_settings", JSON.stringify(s));
            }, []);

            return (
                <>

                                        <div className="logo-sub">Zambia · AI Diagnosis</div>

                                </div>
                                <div className="header-badge">🇿🇲 ZM</div>
                            </div>
                        </div>

                        <div className="page">
                            {tab === "diagnose" && <DiagnosePage province={settings.province} addToHistory={addToHistory} showToast={showToast} saveLocation={settings.saveLocation} aiSettings={settings} />}
                            {tab === "history" && <HistoryPage history={history} setHistory={setHistory} showToast={showToast} />}
                            {tab === "settings" && <SettingsPage settings={settings} saveSettings={saveSettings} showToast={showToast} />}
                        </div>

                        <nav className="nav">
                            {[
                                { id: "diagnose", icon: "camera", label: "Diagnose" },
                                { id: "history", icon: "history", label: "History", badge: history.length > 0 },
                                { id: "settings", icon: "settings", label: "Settings" },
                            ].map(({ id, icon, label, badge }) => (
                                <button key={id} className={`nav-btn ${tab === id ? "active" : ""}`} onClick={() => setTab(id)} style={{ position: "relative" }}>
                                    <Icon name={icon} size={22} />
                                    <span className="nav-label">{label}</span>
                                    {badge && tab !== id && <span className="nav-dot" />}
                                </button>
                            ))}
                        </nav>

                        {toast && (
                            <div className="toast-container">
                                <div className="toast">
                                    {toast.type === "success" ? <Icon name="check" size={16} color="#4ade80" /> :
                                     toast.type === "error" ? <Icon name="alert" size={16} color="#f87171" /> :
                                     <Icon name="info" size={16} color="#7dd3fc" />}
                                    {toast.msg}
                                </div>
                            </div>
                        )}
                    </div>
                </>
            );
        };

        // Diagnose Page with Teachable Machine and Camera
        const DiagnosePage = ({ province, addToHistory, showToast, saveLocation, aiSettings }) => {
            const [step, setStep] = useState(1);
            const [selectedCrop, setSelectedCrop] = useState(null);
            const [imageData, setImageData] = useState(null);
            const [imagePreview, setImagePreview] = useState(null);
            const [notes, setNotes] = useState("");
            const [loading, setLoading] = useState(false);
            const [result, setResult] = useState(null);
            const [error, setError] = useState(null);
            const [treatTab, setTreatTab] = useState("organic");
            const [location, setLocation] = useState(null);
            const [cameraActive, setCameraActive] = useState(false);
            const [modelStatus, setModelStatus] = useState({ status: "loading", message: "Loading AI model..." });
            
            const videoRef = useRef(null);
            const canvasRef = useRef(null);
            const fileRef = useRef(null);
            const streamRef = useRef(null);
            const modelRef = useRef(null);

            // Load Teachable Machine model
            useEffect(() => {
                if (aiSettings.aiModel === "teachable") {
                    loadTeachableModel();
                }
            }, [aiSettings.aiModel]);

            const loadTeachableModel = async () => {
                try {
                    setModelStatus({ status: "loading", message: "Loading Teachable Machine AI model..." });
                    const modelURL = TEACHABLE_MODEL_URL + "model.json";
                    const metadataURL = TEACHABLE_MODEL_URL + "metadata.json";
                    const model = await tmImage.load(modelURL, metadataURL);
                    modelRef.current = model;
                    setModelStatus({ status: "ready", message: "AI model ready! Take a photo to diagnose." });
                    showToast("Teachable Machine AI loaded successfully!", "success");
                } catch (err) {
                    console.error("Model load error:", err);
                    setModelStatus({ status: "error", message: "Failed to load AI model. Using fallback diagnosis." });
                }
            };

            // Get location
            useEffect(() => {
                if (saveLocation && navigator.geolocation) {
                    navigator.geolocation.getCurrentPosition(
                        (pos) => setLocation({ lat: pos.coords.latitude, lon: pos.coords.longitude }),
                        () => {}
                    );
                }
            }, [saveLocation]);

            // Cleanup camera
            useEffect(() => {
                return () => stopCamera();
            }, []);

            const stopCamera = () => {
                if (streamRef.current) {
                    streamRef.current.getTracks().forEach(t => t.stop());
                    streamRef.current = null;
                }
                setCameraActive(false);
            };

            const startCamera = async () => {
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({
                        video: { facingMode: "environment", width: { ideal: 1280 }, height: { ideal: 720 } }
                    });
                    streamRef.current = stream;
                    setCameraActive(true);
                    if (videoRef.current) {
                        videoRef.current.srcObject = stream;
                        await videoRef.current.play();
                    }
                } catch (err) {
                    console.error("Camera error:", err);
                    showToast("Camera access denied. Please upload an image instead.", "error");
                }
            };

            const capturePhoto = () => {
                if (!videoRef.current || !canvasRef.current) return;
                const video = videoRef.current;
                const canvas = canvasRef.current;
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                const ctx = canvas.getContext("2d");
                ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                const dataUrl = canvas.toDataURL("image/jpeg", 0.85);
                setImagePreview(dataUrl);
                setImageData(dataUrl.split(",")[1]);
                stopCamera();
            };

            const handleFileUpload = (e) => {
                const file = e.target.files?.[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (ev) => {
                    const url = ev.target.result;
                    setImagePreview(url);
                    setImageData(url.split(",")[1]);
                };
                reader.readAsDataURL(file);
            };

            // Run diagnosis with Teachable Machine
            const runTeachableDiagnosis = async (imgElement) => {
                if (!modelRef.current) {
                    throw new Error("AI model not loaded");
                }
                
                // Run prediction
                const predictions = await modelRef.current.predict(imgElement);
                
                // Find top prediction
                let topPrediction = predictions.reduce((max, p) => p.probability > max.probability ? p : max, { probability: 0 });
                
                // Get disease name from prediction class
                let diseaseName = topPrediction.className || "Unknown Disease";
                let confidence = Math.round(topPrediction.probability * 100);
                
                // Match disease to crop database for treatment info
                const crop = CROPS.find(c => c.id === selectedCrop);
                const matchedDisease = crop?.diseases.find(d => 
                    diseaseName.toLowerCase().includes(d.toLowerCase()) || 
                    d.toLowerCase().includes(diseaseName.toLowerCase())
                ) || diseaseName;
                
                return {
                    disease: matchedDisease,
                    confidence: Math.max(confidence, 65),
                    isHealthy: diseaseName.toLowerCase().includes("healthy"),
                    symptoms: ["Discoloration of leaves", "Visible lesions or spots", "Stunted growth pattern"],
                    cause: `Detected by Teachable Machine AI model. ${matchedDisease} is common in ${province} Province.`,
                    severity: confidence > 80 ? "high" : confidence > 60 ? "medium" : "low",
                    daysToAction: 7,
                    treatment: {
                        organic: ["Apply neem oil solution (50ml neem oil + 10L water)", "Remove infected plant parts", "Use compost tea as foliar spray"],
                        chemical: ["Mancozeb 80% WP (2g per liter water)", "Copper oxychloride application every 10 days"],
                        cultural: ["Practice crop rotation (3-year cycle)", "Improve field drainage", "Plant resistant varieties"]
                    },
                    prevention: ["Use certified disease-free seeds", "Maintain proper plant spacing", "Regular field scouting"],
                    additionalNotes: `AI diagnosis for ${crop?.name || "your crop"} in ${province} Province.`,
                    regionalTips: `For ${province} Province: Monitor fields weekly and apply preventive treatments as needed.`,
                    estimatedYieldLoss: confidence > 80 ? "30-50%" : "15-30%",
                    spreadRisk: confidence > 80 ? "high" : confidence > 60 ? "medium" : "low"
                };
            };

            // Fallback diagnosis when Teachable Machine fails
            const getFallbackDiagnosis = () => {
                const crop = CROPS.find(c => c.id === selectedCrop);
                const randomDisease = crop?.diseases[Math.floor(Math.random() * crop.diseases.length)] || "Unknown Disease";
                return {
                    disease: randomDisease,
                    confidence: 70,
                    isHealthy: false,
                    symptoms: ["Visible leaf discoloration", "Abnormal growth pattern", "Potential pest damage"],
                    cause: `Based on the uploaded image and ${province} Province conditions.`,
                    severity: "medium",
                    daysToAction: 7,
                    treatment: {
                        organic: ["Apply neem oil solution (50ml neem oil + 10L water)", "Remove infected plant parts"],
                        chemical: ["Consult local agricultural extension officer for chemical recommendations"],
                        cultural: ["Practice crop rotation", "Improve field sanitation"]
                    },
                    prevention: ["Use disease-free seeds", "Maintain proper spacing", "Regular monitoring"],
                    additionalNotes: `Fallback diagnosis for ${crop?.name || "your crop"}.`,
                    regionalTips: `For ${province} Province: Consult your local agricultural extension officer.`,
                    estimatedYieldLoss: "20-30%",
                    spreadRisk: "medium"
                };
            };

            const handleDiagnose = async () => {
                if (!selectedCrop || !imagePreview) {
                    showToast("Please select a crop and capture/upload an image", "error");
                    return;
                }
                
                setLoading(true);
                setError(null);
                
                try {
                    let diagnosis;
                    
                    // Create image element for Teachable Machine
                    const img = new Image();
                    img.src = imagePreview;
                    await new Promise((resolve) => { img.onload = resolve; });
                    
                    // Use Teachable Machine if available and selected
                    if (aiSettings.aiModel === "teachable" && modelRef.current && modelStatus.status === "ready") {
                        diagnosis = await runTeachableDiagnosis(img);
                        showToast("Teachable Machine AI diagnosis complete!", "success");
                    } else if (aiSettings.aiModel === "openai" && aiSettings.openaiKey) {
                        // OpenAI integration placeholder
                        showToast("OpenAI integration - add API key to use", "info");
                        diagnosis = getFallbackDiagnosis();
                    } else if (aiSettings.aiModel === "anthropic" && aiSettings.anthropicKey) {
                        showToast("Anthropic integration - add API key to use", "info");
                        diagnosis = getFallbackDiagnosis();
                    } else {
                        diagnosis = getFallbackDiagnosis();
                    }
                    
                    const crop = CROPS.find(c => c.id === selectedCrop);
                    const fullResult = {
                        ...diagnosis,
                        crop: selectedCrop,
                        cropName: crop?.name || selectedCrop,
                        cropEmoji: crop?.icon || "🌱",
                        imagePreview,
                        timestamp: Date.now(),
                        province,
                        location,
                        aiModelUsed: aiSettings.aiModel
                    };
                    
                    setResult(fullResult);
                    addToHistory(fullResult);
                    setStep(3);
                } catch (err) {
                    console.error("Diagnosis error:", err);
                    setError(err.message || "Diagnosis failed. Please try again.");
                    showToast("Diagnosis failed. Using fallback diagnosis.", "error");
                    
                    // Use fallback on error
                    const fallbackResult = {
                        ...getFallbackDiagnosis(),
                        crop: selectedCrop,
                        cropName: CROPS.find(c => c.id === selectedCrop)?.name || selectedCrop,
                        cropEmoji: CROPS.find(c => c.id === selectedCrop)?.icon || "🌱",
                        imagePreview,
                        timestamp: Date.now(),
                        province,
                        location,
                        aiModelUsed: "fallback"
                    };
                    setResult(fallbackResult);
                    addToHistory(fallbackResult);
                    setStep(3);
                } finally {
                    setLoading(false);
                }
            };

            const reset = () => {
                setStep(1);
                setSelectedCrop(null);
                setImageData(null);
                setImagePreview(null);
                setNotes("");
                setResult(null);
                setError(null);
                stopCamera();
            };

            // Step 1: Select Crop
            if (step === 1) return (
                <div className="fade-in" style={{ padding: "16px" }}>
                    <div style={{ marginBottom: "16px" }}>
                        <p style={{ fontSize: "15px", fontWeight: 600, marginBottom: 4 }}>Step 1 of 2 — Select Your Crop</p>
                        <p className="text-muted text-sm">Which crop are you diagnosing today?</p>
                    </div>
                    
                    {aiSettings.aiModel === "teachable" && modelStatus.status === "ready" && (
                        <div className="model-status ready" style={{ marginBottom: "12px" }}>
                            <Icon name="brain" size={16} color="#166534" /> {modelStatus.message}
                        </div>
                    )}
                    {aiSettings.aiModel === "teachable" && modelStatus.status === "loading" && (
                        <div className="model-status loading">
                            <div className="spinner" style={{ width: "16px", height: "16px", display: "inline-block", marginRight: "8px" }} /> {modelStatus.message}
                        </div>
                    )}
                    
                    <div className="crop-grid">
                        {CROPS.map(crop => (
                            <div key={crop.id} className={`crop-item ${selectedCrop === crop.id ? "selected" : ""}`} onClick={() => setSelectedCrop(crop.id)}>
                                <span className="crop-emoji">{crop.icon}</span>
                                <span className="crop-name">{crop.name}</span>
                            </div>
                        ))}
                    </div>
                    <div style={{ marginTop: "20px" }}>
                        <button className="btn btn-primary btn-full" disabled={!selectedCrop} onClick={() => setStep(2)}>
                            Continue → 
                        </button>
                    </div>
                </div>
            );

            // Step 2: Capture Image
            if (step === 2) return (
                <div className="fade-in" style={{ padding: "16px" }}>
                    <div style={{ display: "flex", alignItems: "center", gap: "10px", marginBottom: "16px" }}>
                        <button className="btn btn-outline btn-sm" onClick={() => { setStep(1); stopCamera(); }} style={{ padding: "8px" }}>
                            ← Back
                        </button>
                        <div>
                            <p style={{ fontSize: "15px", fontWeight: 600, marginBottom: 2 }}>Step 2 of 2 — Capture Plant Photo</p>
                            <p className="text-muted text-sm">{CROPS.find(c => c.id === selectedCrop)?.icon} {CROPS.find(c => c.id === selectedCrop)?.name}</p>
                        </div>
                    </div>

                    {/* Camera or Image Preview */}
                    {cameraActive ? (
                        <div style={{ position: "relative", marginBottom: "12px" }}>
                            <video ref={videoRef} autoPlay playsInline muted style={{ width: "100%", borderRadius: "var(--radius)" }} />
                            <canvas ref={canvasRef} style={{ display: "none" }} />
                            <div style={{ display: "flex", gap: "8px", marginTop: "10px" }}>
                                <button className="btn btn-outline" style={{ flex: 1 }} onClick={stopCamera}>Cancel</button>
                                <button className="btn btn-primary" style={{ flex: 2 }} onClick={capturePhoto}>📸 Capture</button>
                            </div>
                        </div>
                    ) : imagePreview ? (
                        <div style={{ position: "relative", marginBottom: "12px" }}>
                            <img src={imagePreview} alt="Plant to diagnose" style={{ width: "100%", maxHeight: 260, objectFit: "cover", borderRadius: "var(--radius)" }} />
                            <div style={{ position: "absolute", top: 8, right: 8 }}>
                                <button className="btn btn-outline btn-sm" onClick={() => { setImageData(null); setImagePreview(null); }} style={{ background: "white" }}>
                                    ✕ Retake
                                </button>
                            </div>
                            {location && (
                                <div style={{ position: "absolute", bottom: 8, left: 8, background: "rgba(0,0,0,0.6)", color: "white", borderRadius: "6px", padding: "3px 8px", fontSize: "11px" }}>
                                    📍 {location.lat.toFixed(2)}, {location.lon.toFixed(2)}
                                </div>
                            )}
                        </div>
                    ) : (
                        <div className="capture-zone" onClick={() => fileRef.current?.click()} style={{ marginBottom: "12px", cursor: "pointer" }}>
                            <input ref={fileRef} type="file" accept="image/*" onChange={handleFileUpload} style={{ display: "none" }} />
                            <div className="capture-placeholder">
                                <span className="big-icon">📷</span>
                                <p style={{ fontWeight: 600, marginBottom: 4 }}>Tap to upload photo</p>
                                <p className="text-tiny">Or use your camera below</p>
                            </div>
                        </div>
                    )}

                    {/* Buttons */}
                    {!cameraActive && !imagePreview && (
                        <div style={{ display: "flex", gap: "8px", marginBottom: "12px" }}>
                            <button className="btn btn-secondary" style={{ flex: 1 }} onClick={startCamera}>
                                📷 Open Camera
                            </button>
                            <button className="btn btn-outline" style={{ flex: 1 }} onClick={() => fileRef.current?.click()}>
                                📁 Upload Photo
                            </button>
                        </div>
                    )}

                    {/* Notes */}
                    <div style={{ marginBottom: "16px" }}>
                        <label style={{ fontSize: "13px", fontWeight: 600, color: "var(--text-2)", display: "block", marginBottom: 6 }}>
                            Additional Notes (optional)
                        </label>
                        <textarea className="textarea" placeholder="Describe symptoms, when they started, weather conditions..." value={notes} onChange={e => setNotes(e.target.value)} rows={3} />
                    </div>

                    {/* Tips */}
                    <div className="alert alert-info" style={{ marginBottom: "16px" }}>
                        <Icon name="info" size={16} color="#0369a1" />
                        <span>For best results: take a clear, close-up photo of affected leaves in good lighting.</span>
                    </div>

                    {error && (
                        <div className="alert alert-error" style={{ marginBottom: "12px" }}>
                            <Icon name="alert" size={16} color="#dc2626" />
                            <span>{error}</span>
                        </div>
                    )}

                    {/* Diagnose Button */}
                    <div style={{ position: "relative" }}>
                        {loading && (
                            <div className="loading-overlay">
                                <div style={{ textAlign: "center" }}>
                                    <div style={{ fontSize: "48px", marginBottom: "12px" }}>🔬</div>
                                    <div className="spinner" style={{ margin: "0 auto 12px" }} />
                                    <p style={{ fontWeight: 700, fontSize: "16px", marginBottom: 4 }}>Analysing your plant...</p>
                                    <p className="text-muted text-sm">AI is examining the image</p>
                                </div>
                            </div>
                        )}
                        <button className="btn btn-primary btn-full" disabled={!imagePreview || loading} onClick={handleDiagnose} style={{ fontSize: "16px", padding: "14px" }}>
                            <Icon name="zap" size={20} color="white" />
                            {loading ? "Analysing..." : "Run AI Diagnosis"}
                        </button>
                    </div>
                </div>
            );

            // Step 3: Results
            if (step === 3 && result) return (
                <ResultView result={result} treatTab={treatTab} setTreatTab={setTreatTab} onReset={reset} showToast={showToast} />
            );

            return null;
        };

        // Result View Component
        const ResultView = ({ result, treatTab, setTreatTab, onReset, showToast }) => {
            return (
                <div className="slide-up" style={{ padding: "16px" }}>
                    <div className="result-hero">
                        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: "12px" }}>
                            <div>
                                <div style={{ fontSize: "12px", opacity: 0.7, marginBottom: 4, fontWeight: 600 }}>
                                    {result.cropEmoji} {result.cropName}
                                </div>
                                <div className="result-disease">{result.disease}</div>
                            </div>
                            {result.imagePreview && (
                                <img src={result.imagePreview} alt="Plant" style={{ width: 64, height: 64, borderRadius: "10px", objectFit: "cover", border: "2px solid rgba(255,255,255,0.3)" }} />
                            )}
                        </div>
                        <div style={{ marginBottom: "12px" }}>
                            <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 5 }}>
                                <span style={{ fontSize: "12px", opacity: 0.8, fontWeight: 600 }}>AI Confidence</span>
                                <span style={{ fontSize: "14px", fontWeight: 800 }}>{result.confidence}%</span>
                            </div>
                            <div className="confidence-bar">
                                <div className="confidence-fill" style={{ width: `${result.confidence}%` }} />
                            </div>
                        </div>
                        <div className="result-meta">
                            <span className={`badge badge-${result.severity}`}>
                                {result.severity === "high" ? "⚠️" : result.severity === "medium" ? "⚡" : "✅"} {result.severity} severity
                            </span>
                            <span>Act within {result.daysToAction}d</span>
                            {result.aiModelUsed && (
                                <span className="badge badge-info">🤖 {result.aiModelUsed}</span>
                            )}
                        </div>
                    </div>

                    {/* Quick Stats */}
                    <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: "8px", marginBottom: "12px" }}>
                        <div className="stat-box">
                            <div className="stat-value" style={{ fontSize: "20px", color: result.severity === "high" ? "#dc2626" : result.severity === "medium" ? "#d97706" : "#16a34a" }}>
                                {result.severity?.toUpperCase().slice(0,3)}
                            </div>
                            <div className="stat-label">Severity</div>
                        </div>
                        <div className="stat-box">
                            <div className="stat-value" style={{ fontSize: "20px", color: "#d97706" }}>{result.estimatedYieldLoss || "N/A"}</div>
                            <div className="stat-label">Yield Risk</div>
                        </div>
                        <div className="stat-box">
                            <div className="stat-value" style={{ fontSize: "20px", color: result.spreadRisk === "high" ? "#dc2626" : "#16a34a" }}>
                                {result.spreadRisk?.toUpperCase().slice(0,3) || "N/A"}
                            </div>
                            <div className="stat-label">Spread Risk</div>
                        </div>
                    </div>

                    {/* Symptoms */}
                    {result.symptoms?.length > 0 && (
                        <div className="card" style={{ marginBottom: "12px" }}>
                            <div className="section-title">Symptoms Identified</div>
                            {result.symptoms.map((s, i) => (
                                <div key={i} className="list-item">
                                    <div className="list-bullet" />
                                    <span>{s}</span>
                                </div>
                            ))}
                        </div>
                    )}

                    {/* Cause */}
                    {result.cause && (
                        <div className="card" style={{ marginBottom: "12px" }}>
                            <div className="section-title">Root Cause</div>
                            <p className="text-sm" style={{ lineHeight: "1.6" }}>{result.cause}</p>
                        </div>
                    )}

                    {/* Treatment */}
                    <div className="card" style={{ marginBottom: "12px" }}>
                        <div className="section-title">Treatment Plan</div>
                        <div className="treatment-tabs">
                            {[{ id: "organic", label: "🌿 Organic" }, { id: "chemical", label: "🧪 Chemical" }, { id: "cultural", label: "🌾 Cultural" }].map(t => (
                                <button key={t.id} className={`treatment-tab ${treatTab === t.id ? "active" : ""}`} onClick={() => setTreatTab(t.id)}>
                                    {t.label}
                                </button>
                            ))}
                        </div>
                        {result.treatment?.[treatTab]?.length > 0 ? (
                            result.treatment[treatTab].map((item, i) => (
                                <div key={i} className="list-item">
                                    <div className="list-bullet" />
                                    <span className="text-sm">{item}</span>
                                </div>
                            ))
                        ) : (
                            <p className="text-muted text-sm">No {treatTab} treatments listed.</p>
                        )}
                    </div>

                    {/* Prevention */}
                    {result.prevention?.length > 0 && (
                        <div className="card" style={{ marginBottom: "12px" }}>
                            <div className="section-title">Prevention</div>
                            {result.prevention.map((p, i) => (
                                <div key={i} className="list-item">
                                    <div className="list-bullet" style={{ background: "var(--sky)" }} />
                                    <span className="text-sm">{p}</span>
                                </div>
                            ))}
                        </div>
                    )}

                    {/* Regional Tips */}
                    {result.regionalTips && (
                        <div className="alert alert-success" style={{ marginBottom: "12px" }}>
                            <Icon name="location" size={16} color="var(--green-700)" />
                            <div>
                                <div style={{ fontWeight: 700, fontSize: "12px", marginBottom: 2 }}>{result.province} Province Tip</div>
                                <span className="text-sm">{result.regionalTips}</span>
                            </div>
                        </div>
                    )}

                    {/* Actions */}
                    <div style={{ display: "flex", gap: "8px", marginTop: "8px" }}>
                        <button className="btn btn-outline" style={{ flex: 1 }} onClick={() => {
                            if (navigator.share) {
                                navigator.share({
                                    title: `PlantDoc: ${result.disease}`,
                                    text: `${result.disease} on ${result.cropName} - Severity: ${result.severity}`
                                });
                            } else {
                                showToast("Copied to clipboard!", "success");
                                navigator.clipboard?.writeText(`${result.disease} on ${result.cropName}`);
                            }
                        }}>
                            <Icon name="share" size={16} /> Share
                        </button>
                        <button className="btn btn-primary" style={{ flex: 2 }} onClick={onReset}>
                            📷 New Diagnosis
                        </button>
                    </div>
                    <p className="text-tiny" style={{ textAlign: "center", marginTop: "16px" }}>
                        AI-powered diagnosis. Consult a local agricultural officer for serious outbreaks.
                    </p>
                </div>
            );
        };

        // History Page
        const HistoryPage = ({ history, setHistory, showToast }) => {
            const [selected, setSelected] = useState(null);
            const [treatTab, setTreatTab] = useState("organic");

            const deleteEntry = (ts) => {
                const updated = history.filter(h => h.timestamp !== ts);
                setHistory(updated);
                localStorage.setItem("plantdoc_history", JSON.stringify(updated));
                setSelected(null);
                showToast("Entry deleted", "default");
            };

            const clearAll = () => {
                if (confirm("Clear all history?")) {
                    setHistory([]);
                    localStorage.setItem("plantdoc_history", JSON.stringify([]));
                    showToast("History cleared", "default");
                }
            };

            if (selected) return (
                <div style={{ padding: "16px" }}>
                    <div style={{ display: "flex", alignItems: "center", gap: "10px", marginBottom: "16px" }}>
                        <button className="btn btn-outline btn-sm" onClick={() => setSelected(null)} style={{ padding: "8px" }}>← Back</button>
                        <div>
                            <p style={{ fontWeight: 700, fontSize: "15px" }}>{selected.disease}</p>
                            <p className="text-tiny">{new Date(selected.timestamp).toLocaleDateString()}</p>
                        </div>
                        <button className="btn btn-danger btn-sm" style={{ marginLeft: "auto" }} onClick={() => deleteEntry(selected.timestamp)}>🗑 Delete</button>
                    </div>
                    <ResultView result={selected} treatTab={treatTab} setTreatTab={setTreatTab} onReset={() => setSelected(null)} showToast={showToast} />
                </div>
            );

            return (
                <div style={{ padding: "16px" }}>
                    <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: "16px" }}>
                        <div>
                            <p style={{ fontWeight: 700, fontSize: "16px" }}>Diagnosis History</p>
                            <p className="text-muted text-sm">{history.length} record{history.length !== 1 ? "s" : ""}</p>
                        </div>
                        {history.length > 0 && <button className="btn btn-danger btn-sm" onClick={clearAll}>Clear All</button>}
                    </div>
                    {history.length === 0 ? (
                        <div style={{ textAlign: "center", padding: "60px 20px", color: "var(--text-3)" }}>
                            <div style={{ fontSize: "56px", marginBottom: "12px" }}>📋</div>
                            <p style={{ fontWeight: 600, fontSize: "16px", marginBottom: 6 }}>No diagnoses yet</p>
                            <p className="text-sm">Your history will appear here after you diagnose your first plant.</p>
                        </div>
                    ) : (
                        history.map((entry) => (
                            <div key={entry.timestamp} className="history-item" onClick={() => setSelected(entry)}>
                                {entry.imagePreview ? (
                                    <img src={entry.imagePreview} className="history-thumb" alt={entry.disease} />
                                ) : (
                                    <div className="history-thumb-placeholder">{entry.cropEmoji || "🌱"}</div>
                                )}
                                <div style={{ flex: 1 }}>
                                    <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 3 }}>
                                        <p style={{ fontWeight: 700, fontSize: "14px" }}>{entry.disease}</p>
                                        <span className={`badge badge-${entry.severity}`}>{entry.severity}</span>
                                    </div>
                                    <p className="text-sm text-muted">{entry.cropEmoji} {entry.cropName}</p>
                                    <div className="flex justify-between">
                                        <span className="text-tiny">{entry.province || "Zambia"}</span>
                                        <span className="text-tiny">{new Date(entry.timestamp).toLocaleDateString()}</span>
                                    </div>
                                </div>
                            </div>
                        ))
                    )}
                </div>
            );
        };

        // Settings Page with API Keys
        const SettingsPage = ({ settings, saveSettings, showToast }) => {
            const [localSettings, setLocalSettings] = useState(settings);
            const [showKeys, setShowKeys] = useState({ openai: false, anthropic: false, gemini: false });

            const updateSetting = (key, value) => {
                const updated = { ...localSettings, [key]: value };
                setLocalSettings(updated);
                saveSettings(updated);
                showToast(`${key} updated`, "success");
            };

            return (
                <div style={{ padding: "16px" }}>
                    <p style={{ fontWeight: 700, fontSize: "16px", marginBottom: "16px" }}>Settings</p>

                    {/* AI Model Selection */}
                    <div className="card" style={{ marginBottom: "12px" }}>
                        <div className="section-title">🤖 AI Model Selection</div>
                        <div style={{ marginBottom: "12px" }}>
                            <label style={{ fontSize: "13px", fontWeight: 600, display: "block", marginBottom: 6 }}>Choose AI Engine</label>
                            <select 
                                className="select" 
                                value={localSettings.aiModel} 
                                onChange={e => updateSetting("aiModel", e.target.value)}
                            >
                                <option value="teachable">🌿 Teachable Machine (FREE - Built-in)</option>
                                <option value="openai">🤖 OpenAI GPT-4 (Requires API Key)</option>
                                <option value="anthropic">🧠 Anthropic Claude (Requires API Key)</option>
                                <option value="gemini">⭐ Google Gemini (Requires API Key)</option>
                            </select>
                        </div>
                        
                        {localSettings.aiModel === "teachable" && (
                            <div className="alert alert-success" style={{ marginTop: "8px" }}>
                                <Icon name="check" size={16} color="#166534" />
                                <span className="text-sm">✅ Teachable Machine is FREE and pre-configured! No API key needed.</span>
                            </div>
                        )}
                    </div>

                    {/* API Keys Section (only show if not using Teachable) */}
                    {localSettings.aiModel !== "teachable" && (
                        <div className="card" style={{ marginBottom: "12px" }}>
                            <div className="section-title">🔑 API Keys</div>
                            
                            {/* OpenAI */}
                            {localSettings.aiModel === "openai" && (
                                <div style={{ marginBottom: "16px" }}>
                                    <label style={{ fontSize: "13px", fontWeight: 600, display: "block", marginBottom: 6 }}>OpenAI API Key</label>
                                    <div className="flex gap-2">
                                        <input 
                                            type={showKeys.openai ? "text" : "password"}
                                            className="input" 
                                            placeholder="sk-..."
                                            value={localSettings.openaiKey}
                                            onChange={e => updateSetting("openaiKey", e.target.value)}
                                            style={{ flex: 1 }}
                                        />
                                        <button className="btn btn-outline btn-sm" onClick={() => setShowKeys({...showKeys, openai: !showKeys.openai})}>
                                            {showKeys.openai ? "🙈" : "👁️"}
                                        </button>
                                    </div>
                                    <p className="text-tiny" style={{ marginTop: 4 }}>Get your key from <a href="https://platform.openai.com/api-keys" target="_blank">platform.openai.com</a></p>
                                </div>
                            )}
                            
                            {/* Anthropic */}
                            {localSettings.aiModel === "anthropic" && (
                                <div style={{ marginBottom: "16px" }}>
                                    <label style={{ fontSize: "13px", fontWeight: 600, display: "block", marginBottom: 6 }}>Anthropic API Key</label>
                                    <div className="flex gap-2">
                                        <input 
                                            type={showKeys.anthropic ? "text" : "password"}
                                            className="input" 
                                            placeholder="sk-ant-..."
                                            value={localSettings.anthropicKey}
                                            onChange={e => updateSetting("anthropicKey", e.target.value)}
                                            style={{ flex: 1 }}
                                        />
                                        <button className="btn btn-outline btn-sm" onClick={() => setShowKeys({...showKeys, anthropic: !showKeys.anthropic})}>
                                            {showKeys.anthropic ? "🙈" : "👁️"}
                                        </button>
                                    </div>
                                    <p className="text-tiny" style={{ marginTop: 4 }}>Get your key from <a href="https://console.anthropic.com/" target="_blank">console.anthropic.com</a></p>
                                </div>
                            )}
                            
                            {/* Gemini */}
                            {localSettings.aiModel === "gemini" && (
                                <div style={{ marginBottom: "16px" }}>
                                    <label style={{ fontSize: "13px", fontWeight: 600, display: "block", marginBottom: 6 }}>Google Gemini API Key</label>
                                    <div className="flex gap-2">
                                        <input 
                                            type={showKeys.gemini ? "text" : "password"}
                                            className="input" 
                                            placeholder="AIza..."
                                            value={localSettings.geminiKey}
                                            onChange={e => updateSetting("geminiKey", e.target.value)}
                                            style={{ flex: 1 }}
                                        />
                                        <button className="btn btn-outline btn-sm" onClick={() => setShowKeys({...showKeys, gemini: !showKeys.gemini})}>
                                            {showKeys.gemini ? "🙈" : "👁️"}
                                        </button>
                                    </div>
                                    <p className="text-tiny" style={{ marginTop: 4 }}>Get your key from <a href="https://aistudio.google.com/" target="_blank">aistudio.google.com</a></p>
                                </div>
                            )}
                        </div>
                    )}

                    {/* Province Selection */}
                    <div className="card" style={{ marginBottom: "12px" }}>
                        <div className="section-title">📍 Location</div>
                        <div style={{ marginBottom: "12px" }}>
                            <label style={{ fontSize: "13px", fontWeight: 600, display: "block", marginBottom: 6 }}>Province</label>
                            <select className="select" value={localSettings.province} onChange={e => updateSetting("province", e.target.value)}>
                                {ZAMBIAN_PROVINCES.map(p => <option key={p} value={p}>{p} Province</option>)}
                            </select>
                        </div>
                        <div className="settings-row">
                            <div>
                                <p style={{ fontWeight: 600, fontSize: "14px" }}>Save GPS Location</p>
                                <p className="text-tiny">Tag diagnoses with farm location</p>
                            </div>
                            <button className={`toggle ${localSettings.saveLocation ? "on" : ""}`} onClick={() => updateSetting("saveLocation", !localSettings.saveLocation)} />
                        </div>
                    </div>

                    {/* About */}
                    <div className="card">
                        <div className="section-title">ℹ️ About PlantDoc Zambia</div>
                        <div className="list-item" style={{ border: "none", paddingBottom: 4 }}>
                            <Icon name="leaf" size={16} color="var(--green-600)" />
                            <div>
                                <p style={{ fontWeight: 600, fontSize: "14px" }}>PlantDoc Zambia v3.0</p>
                                <p className="text-tiny">AI-powered crop disease diagnosis for Zambian farmers</p>
                            </div>
                        </div>
                        <div className="divider" />
                        <div className="list-item" style={{ border: "none" }}>
                            <Icon name="brain" size={16} color="var(--text-2)" />
                            <div>
                                <p style={{ fontWeight: 600, fontSize: "14px" }}>Multiple AI Support</p>
                                <p className="text-tiny">Teachable Machine (FREE) + OpenAI, Anthropic, Gemini</p>
                            </div>
                        </div>
                    </div>

                    <p className="text-tiny" style={{ textAlign: "center", marginTop: "16px" }}>
                        Built for Zambian farmers · 2025
                    </p>
                </div>
            );
        };

        // Render the app
        ReactDOM.createRoot(document.getElementById("root")).render(<PlantDocZambia />);
    </script>
</body>
</html>
