<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>PlantDoc Pro | AI Precision Agriculture Zambia</title>
    <script src="https://cdn.jsdelivr.net/npm/react@18.2.0/umd/react.development.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/react-dom@18.2.0/umd/react-dom.development.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            font-family: 'Inter', sans-serif;
            background: #F1F5F9;
            overflow: hidden;
            position: fixed;
            width: 100%;
            height: 100%;
        }
        #root {
            width: 100%;
            height: 100%;
            position: relative;
        }
        .scrollable::-webkit-scrollbar {
            width: 4px;
        }
        .scrollable::-webkit-scrollbar-track {
            background: #E2E8F0;
            border-radius: 4px;
        }
        .scrollable::-webkit-scrollbar-thumb {
            background: #0D9488;
            border-radius: 4px;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .fade-in {
            animation: fadeIn 0.3s ease;
        }
    </style>
</head>
<body>
    <div id="root"></div>
    
    <script type="text/babel">
        const { useState, useRef, useEffect, useCallback } = React;

        // Zambian Crop Database with premium SVG icons
        const CROPS = [
            { id: "maize", name: "Maize", iconSvg: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 2v20M7 4l5 2 5-2M7 10l5 2 5-2M7 16l5 2 5-2M4 12h16"/><path d="M8 4v12M16 4v12"/></svg>', diseases: ["Gray Leaf Spot", "Maize Streak Virus", "Northern Corn Leaf Blight"] },
            { id: "groundnuts", name: "Groundnuts", iconSvg: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><ellipse cx="12" cy="14" rx="6" ry="8"/><path d="M6 6c0-2 2-4 6-4s6 2 6 4"/></svg>', diseases: ["Rosette Disease", "Early Leaf Spot", "Late Leaf Spot"] },
            { id: "soybean", name: "Soybean", iconSvg: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 2v4M6 8l2-2M18 8l-2-2M8 20h8M12 12v8"/><ellipse cx="12" cy="12" rx="8" ry="3"/></svg>', diseases: ["Soybean Mosaic Virus", "Sudden Death Syndrome", "Phytophthora Root Rot"] },
            { id: "cotton", name: "Cotton", iconSvg: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 2v6M12 16v6M4 12h6M14 12h6"/><circle cx="12" cy="12" r="3"/></svg>', diseases: ["Bacterial Blight", "Fusarium Wilt", "Bollworm"] },
            { id: "cassava", name: "Cassava", iconSvg: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 2v10M8 8l4 2 4-2M6 14h12"/><path d="M8 22l4-2 4 2"/></svg>', diseases: ["Cassava Mosaic Disease", "Cassava Brown Streak", "Root Rot"] },
            { id: "tomato", name: "Tomato", iconSvg: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 2c2 0 4 2 4 4 0 1-1 2-2 2h-4c-1 0-2-1-2-2 0-2 2-4 4-4z"/><path d="M12 6c-3 0-6 2-6 5s3 5 6 5 6-2 6-5-3-5-6-5z"/><path d="M9 12c0 1 1 2 3 2s3-1 3-2"/></svg>', diseases: ["Early Blight", "Late Blight", "Tomato Yellow Leaf Curl Virus"] },
            { id: "lemon", name: "Lemon", iconSvg: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><ellipse cx="12" cy="14" rx="8" ry="7"/><path d="M12 7c-3 0-6 2-6 5s3 5 6 5 6-2 6-5-3-5-6-5z"/><path d="M12 12l2-2"/><path d="M12 2v3"/></svg>', diseases: ["Citrus Canker", "Citrus Greening", "Lemon Scab"] },
            { id: "avocado", name: "Avocado", iconSvg: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><ellipse cx="12" cy="14" rx="7" ry="6"/><circle cx="12" cy="14" r="2.5"/><path d="M12 8c0-2 2-4 4-4s4 2 4 4"/><path d="M12 8c0-2-2-4-4-4S4 6 4 8"/></svg>', diseases: ["Avocado Root Rot", "Avocado Sunblotch", "Anthracnose"] },
            { id: "beans", name: "Beans", iconSvg: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><ellipse cx="12" cy="12" rx="5" ry="8"/><path d="M12 4v8"/></svg>', diseases: ["Bean Common Mosaic Virus", "Angular Leaf Spot", "Rust"] },
            { id: "wheat", name: "Wheat", iconSvg: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 2v20M8 6l4-2 4 2M8 12l4-2 4 2"/></svg>', diseases: ["Stem Rust", "Yellow Rust", "Leaf Rust"] }
        ];

        const ZAMBIAN_PROVINCES = ["Lusaka", "Copperbelt", "Central", "Eastern", "Southern", "Northern", "Luapula", "Western", "North-Western", "Muchinga"];
        const TEACHABLE_MODEL_URL = "https://teachablemachine.withgoogle.com/models/drdcQS-r_/";

        // SVG Icons for AI Providers
        const AIProviderIcons = {
            openai: '<svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2z" fill="#10A37F"/><path d="M12 6v6l4 2" stroke="white" stroke-width="1.5" fill="none"/><circle cx="12" cy="12" r="2" fill="white"/></svg>',
            anthropic: '<svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M12 2L2 7l10 5 10-5-10-5z" fill="#7C3AED"/><path d="M2 17l10 5 10-5" stroke="#7C3AED" stroke-width="2" fill="none"/><path d="M2 12l10 5 10-5" stroke="#7C3AED" stroke-width="2" fill="none"/></svg>',
            gemini: '<svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M12 2L15 9H22L16 14L19 21L12 16L5 21L8 14L2 9H9L12 2Z" fill="#4285F4" stroke="none"/></svg>',
            teachable: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 2v4M4 12H2M22 12h-2M12 22v-4M6 6L4 8M20 8l-2-2"/><circle cx="12" cy="12" r="4"/></svg>'
        };

        // General Icons
        const Icon = ({ name, size = 22, color = "currentColor", svgContent = null }) => {
            const icons = {
                camera: <svg width={size} height={size} fill="none" stroke={color} strokeWidth="2" viewBox="0 0 24 24"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>,
                history: <svg width={size} height={size} fill="none" stroke={color} strokeWidth="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>,
                settings: <svg width={size} height={size} fill="none" stroke={color} strokeWidth="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>,
                zap: <svg width={size} height={size} fill="none" stroke={color} strokeWidth="2" viewBox="0 0 24 24"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>,
                brain: <svg width={size} height={size} fill="none" stroke={color} strokeWidth="2" viewBox="0 0 24 24"><path d="M12 4a4 4 0 0 1 3.5 6A4 4 0 0 1 12 18a4 4 0 0 1-3.5-6A4 4 0 0 1 12 4z"/><path d="M12 2v2M12 20v2"/></svg>,
                check: <svg width={size} height={size} fill="none" stroke={color} strokeWidth="2.5" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>,
                share: <svg width={size} height={size} fill="none" stroke={color} strokeWidth="2" viewBox="0 0 24 24"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/></svg>,
                key: <svg width={size} height={size} fill="none" stroke={color} strokeWidth="2" viewBox="0 0 24 24"><path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4"/></svg>,
                leaf: <svg width={size} height={size} fill="none" stroke={color} strokeWidth="2" viewBox="0 0 24 24"><path d="M12 2L9 7h6l-3-5z"/><path d="M12 7v12"/><path d="M8 12h8"/></svg>,
                location: <svg width={size} height={size} fill="none" stroke={color} strokeWidth="2" viewBox="0 0 24 24"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
            };
            if (svgContent) {
                return <div style={{ width: size, height: size }} dangerouslySetInnerHTML={{ __html: svgContent }} />;
            }
            return icons[name] || null;
        };

        // Main App Component with Fixed Layout
        const PlantDocZambia = () => {
            const [activeTab, setActiveTab] = useState("diagnose");
            const [history, setHistory] = useState(() => { try { return JSON.parse(localStorage.getItem("plantdoc_history") || "[]"); } catch { return []; } });
            const [settings, setSettings] = useState(() => ({ province: "Lusaka", saveLocation: true, activeAI: "teachable", apiKeys: { openai: "", anthropic: "", gemini: "" } }));
            const [toast, setToast] = useState(null);
            const showToast = useCallback((msg, type = "success") => { setToast({ msg, type }); setTimeout(() => setToast(null), 2500); }, []);

            const addToHistory = useCallback((entry) => {
                const updated = [entry, ...history].slice(0, 50);
                setHistory(updated);
                localStorage.setItem("plantdoc_history", JSON.stringify(updated));
            }, [history]);

            return (
                <div style={{ display: "flex", flexDirection: "column", height: "100vh", width: "100%", background: "#FFFFFF", overflow: "hidden" }}>
                    {/* Fixed Header */}
                    <div style={{ background: "linear-gradient(135deg, #0F766E 0%, #0D9488 100%)", padding: "16px 20px", flexShrink: 0, zIndex: 20 }}>
                        <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between" }}>
                            <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
                                <div style={{ width: 40, height: 40, background: "rgba(255,255,255,0.2)", borderRadius: 12, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 20 }}>🌿</div>
                                <div>
                                    <div style={{ fontSize: 18, fontWeight: 800, color: "white", letterSpacing: -0.3 }}>PlantDoc Pro</div>
                                    <div style={{ fontSize: 9, fontWeight: 500, color: "rgba(255,255,255,0.75)", textTransform: "uppercase" }}>Zambia · Multi-AI Platform</div>
                                </div>
                            </div>
                            <div style={{ background: "rgba(255,255,255,0.15)", padding: "5px 12px", borderRadius: 40, fontSize: 11, fontWeight: 600, color: "white" }}>🇿🇲 ZM</div>
                        </div>
                    </div>

                    {/* Scrollable Content Area - REDUCED PADDING */}
                    <div className="scrollable" style={{ flex: 1, overflowY: "auto", overflowX: "hidden", padding: "16px 16px 160px 16px" }}>
                        {activeTab === "diagnose" && <DiagnosePage province={settings.province} addToHistory={addToHistory} showToast={showToast} apiKeys={settings.apiKeys} activeAI={settings.activeAI} />}
                        {activeTab === "history" && <HistoryPage history={history} setHistory={setHistory} showToast={showToast} />}
                        {activeTab === "settings" && <SettingsPage settings={settings} saveSettings={setSettings} showToast={showToast} />}
                    </div>

                    {/* Fixed Bottom Navigation */}
                    <div style={{ position: "fixed", bottom: 0, left: 0, right: 0, maxWidth: 480, margin: "0 auto", background: "rgba(255,255,255,0.98)", backdropFilter: "blur(20px)", borderTop: "1px solid #E2E8F0", display: "flex", padding: "8px 20px 12px", gap: 12, zIndex: 30, boxShadow: "0 -4px 12px rgba(0,0,0,0.03)" }}>
                        {[
                            { id: "diagnose", icon: "camera", label: "Diagnose" },
                            { id: "history", icon: "history", label: "History" },
                            { id: "settings", icon: "settings", label: "Settings" }
                        ].map(tab => (
                            <button key={tab.id} onClick={() => setActiveTab(tab.id)} style={{ flex: 1, display: "flex", flexDirection: "column", alignItems: "center", gap: 4, padding: "8px 12px", background: "none", border: "none", cursor: "pointer", fontFamily: "Inter", borderRadius: 12, transition: "all 0.2s ease", color: activeTab === tab.id ? "#0D9488" : "#94A3B8", backgroundColor: activeTab === tab.id ? "rgba(13,148,136,0.08)" : "transparent" }}>
                                <Icon name={tab.icon} size={22} />
                                <span style={{ fontSize: 11, fontWeight: 600, letterSpacing: 0.3 }}>{tab.label}</span>
                            </button>
                        ))}
                    </div>

                    {/* Toast */}
                    {toast && (
                        <div style={{ position: "fixed", bottom: 90, left: "50%", transform: "translateX(-50%)", background: "#1E293B", color: "white", padding: "10px 18px", borderRadius: 40, fontSize: 13, fontWeight: 500, display: "flex", alignItems: "center", gap: 8, zIndex: 100, whiteSpace: "nowrap", boxShadow: "0 4px 12px rgba(0,0,0,0.15)", pointerEvents: "none" }}>
                            <Icon name="check" size={16} color="#10B981" />
                            {toast.msg}
                        </div>
                    )}
                </div>
            );
        };

        // Diagnose Page - BUTTON RIGHT BELOW CAMERA
        const DiagnosePage = ({ province, addToHistory, showToast }) => {
            const [selectedCrop, setSelectedCrop] = useState(null);
            const [imagePreview, setImagePreview] = useState(null);
            const [imageBlob, setImageBlob] = useState(null);
            const [loading, setLoading] = useState(false);
            const [result, setResult] = useState(null);
            const [modelReady, setModelReady] = useState(false);
            const [cameraActive, setCameraActive] = useState(false);
            const videoRef = useRef(null);
            const canvasRef = useRef(null);
            const modelRef = useRef(null);
            const fileRef = useRef(null);
            const streamRef = useRef(null);

            useEffect(() => {
                const loadModel = async () => {
                    try {
                        const model = await tmImage.load(TEACHABLE_MODEL_URL + "model.json", TEACHABLE_MODEL_URL + "metadata.json");
                        modelRef.current = model;
                        setModelReady(true);
                        showToast("AI model ready", "success");
                    } catch (err) {
                        console.error(err);
                        showToast("Model load failed", "error");
                    }
                };
                loadModel();
                return () => {
                    if (streamRef.current) streamRef.current.getTracks().forEach(t => t.stop());
                };
            }, []);

            const stopCamera = () => {
                if (streamRef.current) {
                    streamRef.current.getTracks().forEach(t => t.stop());
                    streamRef.current = null;
                }
                setCameraActive(false);
            };

            const startCamera = async () => {
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
                    streamRef.current = stream;
                    if (videoRef.current) videoRef.current.srcObject = stream;
                    setCameraActive(true);
                } catch {
                    showToast("Camera access denied", "error");
                }
            };

            const capturePhoto = () => {
                const video = videoRef.current;
                const canvas = canvasRef.current;
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                canvas.getContext("2d").drawImage(video, 0, 0);
                canvas.toBlob(blob => {
                    setImageBlob(blob);
                    setImagePreview(URL.createObjectURL(blob));
                    stopCamera();
                }, "image/jpeg");
            };

            const handleFileUpload = (e) => {
                const file = e.target.files?.[0];
                if (file) {
                    setImageBlob(file);
                    setImagePreview(URL.createObjectURL(file));
                }
            };

            const runDiagnosis = async () => {
                if (!modelRef.current) throw new Error("Model not ready");
                const img = new Image();
                const url = URL.createObjectURL(imageBlob);
                img.src = url;
                await new Promise(r => { img.onload = r; });
                const predictions = await modelRef.current.predict(img);
                URL.revokeObjectURL(url);
                const top = predictions.reduce((max, p) => p.probability > max.probability ? p : max, { probability: 0 });
                const disease = top.className || "Unknown Condition";
                const confidence = Math.round(top.probability * 100);
                const severity = confidence > 85 ? "high" : confidence > 65 ? "medium" : "low";
                const crop = CROPS.find(c => c.id === selectedCrop);
                return {
                    disease, confidence, crop: selectedCrop, cropName: crop?.name, cropSvg: crop?.iconSvg, imagePreview,
                    timestamp: Date.now(), province, severity,
                    organicRemedy: "🌿 Apply neem oil (2%) every 7 days. Remove infected leaves and dispose properly.",
                    chemicalRemedy: "🧪 Use copper-based fungicide. Follow label instructions carefully. Wear protective gear.",
                    culturalPractice: "🌾 Practice 3-year crop rotation. Improve field drainage. Remove crop residues.",
                    prevention: "✅ Use certified disease-free seeds. Scout fields weekly. Maintain proper plant spacing."
                };
            };

            const handleDiagnose = async () => {
                if (!selectedCrop) { showToast("Select a crop first", "error"); return; }
                if (!imageBlob) { showToast("Capture or upload a photo", "error"); return; }
                if (!modelReady) { showToast("AI model loading...", "error"); return; }
                setLoading(true);
                try {
                    const diagnosis = await runDiagnosis();
                    setResult(diagnosis);
                    addToHistory(diagnosis);
                    showToast("AI diagnosis complete!", "success");
                } catch (err) {
                    showToast("Diagnosis failed", "error");
                } finally {
                    setLoading(false);
                }
            };

            if (result) {
                return <ResultView result={result} onReset={() => { setResult(null); setImagePreview(null); setImageBlob(null); setSelectedCrop(null); }} showToast={showToast} />;
            }

            return (
                <div className="fade-in">
                    {!modelReady && (
                        <div style={{ background: "#F0F9FF", border: "1px solid #BAE6FD", borderRadius: 16, padding: "12px 16px", marginBottom: 16, display: "flex", alignItems: "center", gap: 10, fontSize: 13, color: "#0369A1" }}>
                            <div style={{ width: 16, height: 16, border: "2px solid #BAE6FD", borderTopColor: "#0D9488", borderRadius: "50%", animation: "spin 0.6s linear infinite" }}></div>
                            Loading AI model...
                        </div>
                    )}

                    {/* Crop Selection */}
                    <div style={{ marginBottom: 20 }}>
                        <div style={{ fontSize: 12, fontWeight: 700, color: "#475569", letterSpacing: 0.8, textTransform: "uppercase", marginBottom: 10, display: "flex", alignItems: "center", gap: 6 }}>
                            <Icon name="leaf" size={14} /> Select Crop
                        </div>
                        <div style={{ display: "grid", gridTemplateColumns: "repeat(3, 1fr)", gap: 8 }}>
                            {CROPS.map(crop => (
                                <div key={crop.id} onClick={() => setSelectedCrop(crop.id)} style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: 6, padding: "10px 6px", border: selectedCrop === crop.id ? "2px solid #0D9488" : "2px solid #E2E8F0", borderRadius: 14, background: selectedCrop === crop.id ? "rgba(13,148,136,0.04)" : "white", cursor: "pointer", transition: "all 0.2s" }}>
                                    <div style={{ width: 28, height: 28, color: selectedCrop === crop.id ? "#0D9488" : "#64748B" }} dangerouslySetInnerHTML={{ __html: crop.iconSvg }} />
                                    <span style={{ fontSize: 11, fontWeight: 600, color: "#334155" }}>{crop.name}</span>
                                </div>
                            ))}
                        </div>
                    </div>

                    {/* Plant Photo Section */}
                    <div style={{ marginBottom: 16 }}>
                        <div style={{ fontSize: 12, fontWeight: 700, color: "#475569", letterSpacing: 0.8, textTransform: "uppercase", marginBottom: 10, display: "flex", alignItems: "center", gap: 6 }}>
                            <Icon name="camera" size={14} /> Plant Photo
                        </div>
                        
                        {cameraActive ? (
                            <div>
                                <video ref={videoRef} autoPlay playsInline muted style={{ width: "100%", borderRadius: 16, background: "#F1F5F9" }} />
                                <canvas ref={canvasRef} style={{ display: "none" }} />
                                <div style={{ display: "flex", gap: 10, marginTop: 10 }}>
                                    <button onClick={stopCamera} style={{ flex: 1, padding: "10px", borderRadius: 12, border: "1.5px solid #E2E8F0", background: "white", fontWeight: 600, cursor: "pointer" }}>Cancel</button>
                                    <button onClick={capturePhoto} style={{ flex: 2, padding: "10px", borderRadius: 12, border: "none", background: "#0D9488", color: "white", fontWeight: 600, cursor: "pointer" }}>Capture</button>
                                </div>
                            </div>
                        ) : imagePreview ? (
                            <div>
                                <img src={imagePreview} alt="Preview" style={{ width: "100%", borderRadius: 16, maxHeight: 200, objectFit: "cover" }} />
                                <button onClick={() => { setImagePreview(null); setImageBlob(null); }} style={{ marginTop: 10, width: "100%", padding: "8px", borderRadius: 12, border: "1.5px solid #E2E8F0", background: "white", fontWeight: 500, cursor: "pointer" }}>Retake Photo</button>
                            </div>
                        ) : (
                            <div onClick={() => fileRef.current?.click()} style={{ border: "2px dashed #CBD5E1", borderRadius: 16, background: "#F8FAFC", padding: "30px 20px", textAlign: "center", cursor: "pointer" }}>
                                <input ref={fileRef} type="file" accept="image/*" onChange={handleFileUpload} style={{ display: "none" }} />
                                <div style={{ fontSize: 40, marginBottom: 6 }}>📸</div>
                                <div style={{ fontSize: 13, fontWeight: 500, marginBottom: 8 }}>Upload or take a photo</div>
                                <button onClick={(e) => { e.stopPropagation(); startCamera(); }} style={{ background: "white", border: "1.5px solid #0D9488", padding: "6px 16px", borderRadius: 40, fontWeight: 600, fontSize: 12, color: "#0D9488", cursor: "pointer" }}>Open Camera</button>
                            </div>
                        )}
                    </div>

                    {/* DIAGNOSE BUTTON - STICKY, ALWAYS VISIBLE ABOVE NAV BAR */}
                    <div style={{ position: "fixed", bottom: 70, left: 0, right: 0, maxWidth: 480, margin: "0 auto", padding: "10px 16px", background: "rgba(241,245,249,0.97)", backdropFilter: "blur(10px)", zIndex: 25 }}>
                        <button 
                            disabled={!selectedCrop || !imagePreview || loading || !modelReady} 
                            onClick={handleDiagnose} 
                            style={{ 
                                width: "100%", 
                                padding: "14px", 
                                borderRadius: 14, 
                                border: "none", 
                                background: (!selectedCrop || !imagePreview || loading || !modelReady) ? "#CBD5E1" : "#0D9488", 
                                color: "white", 
                                fontWeight: 700, 
                                fontSize: 16, 
                                cursor: (!selectedCrop || !imagePreview || loading || !modelReady) ? "not-allowed" : "pointer", 
                                display: "flex", 
                                alignItems: "center", 
                                justifyContent: "center", 
                                gap: 8,
                                transition: "all 0.2s",
                                boxShadow: (!selectedCrop || !imagePreview || loading || !modelReady) ? "none" : "0 4px 14px rgba(13,148,136,0.35)"
                            }}
                        >
                            <Icon name="zap" size={18} />
                            {loading ? "Analyzing..." : "Run AI Diagnosis"}
                        </button>
                    </div>
                    <div style={{ height: 80 }} />

                    {loading && (
                        <div style={{ position: "fixed", inset: 0, background: "rgba(255,255,255,0.95)", display: "flex", alignItems: "center", justifyContent: "center", flexDirection: "column", gap: 16, zIndex: 100 }}>
                            <div style={{ width: 48, height: 48, border: "3px solid #E2E8F0", borderTopColor: "#0D9488", borderRadius: "50%", animation: "spin 0.8s linear infinite" }}></div>
                            <div style={{ fontWeight: 600 }}>AI is analyzing your plant...</div>
                        </div>
                    )}
                </div>
            );
        };

        // Result View
        const ResultView = ({ result, onReset, showToast }) => {
            const [treatTab, setTreatTab] = useState("organic");
            return (
                <div className="fade-in">
                    <div style={{ background: "linear-gradient(135deg, #0F766E, #0D9488)", borderRadius: 24, padding: 20, marginBottom: 16, color: "white" }}>
                        <div style={{ fontSize: 22, fontWeight: 800, letterSpacing: -0.3, marginBottom: 8 }}>{result.disease}</div>
                        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10 }}>
                            <span>Confidence: {result.confidence}%</span>
                            <span style={{ background: "rgba(255,255,255,0.2)", padding: "4px 12px", borderRadius: 40, fontSize: 11, fontWeight: 600 }}>{result.severity} severity</span>
                        </div>
                        <div style={{ height: 6, background: "rgba(255,255,255,0.2)", borderRadius: 3, overflow: "hidden" }}>
                            <div style={{ width: `${result.confidence}%`, height: "100%", background: "white", borderRadius: 3 }} />
                        </div>
                        <div style={{ fontSize: 12, marginTop: 12, opacity: 0.8 }}>{result.cropName} · {result.province}</div>
                    </div>

                    <div style={{ background: "white", borderRadius: 20, padding: 20, marginBottom: 16, border: "1px solid #F1F5F9", boxShadow: "0 1px 2px rgba(0,0,0,0.03)" }}>
                        <div style={{ fontSize: 12, fontWeight: 700, color: "#475569", textTransform: "uppercase", marginBottom: 16 }}>Treatment Plan</div>
                        <div style={{ display: "flex", gap: 8, marginBottom: 16 }}>
                            {["organic", "chemical", "cultural"].map(tab => (
                                <button key={tab} onClick={() => setTreatTab(tab)} style={{ padding: "6px 16px", borderRadius: 40, border: "1.5px solid #E2E8F0", background: treatTab === tab ? "#0D9488" : "white", color: treatTab === tab ? "white" : "#475569", fontWeight: 600, fontSize: 12, cursor: "pointer" }}>{tab.charAt(0).toUpperCase() + tab.slice(1)}</button>
                            ))}
                        </div>
                        <div style={{ display: "flex", gap: 12, padding: "12px 0" }}>
                            <div style={{ width: 6, height: 6, background: "#0D9488", borderRadius: "50%", marginTop: 6 }} />
                            <span style={{ fontSize: 14, lineHeight: 1.5 }}>{treatTab === "organic" ? result.organicRemedy : treatTab === "chemical" ? result.chemicalRemedy : result.culturalPractice}</span>
                        </div>
                    </div>

                    <div style={{ background: "white", borderRadius: 20, padding: 20, marginBottom: 16, border: "1px solid #F1F5F9" }}>
                        <div style={{ fontSize: 12, fontWeight: 700, color: "#475569", textTransform: "uppercase", marginBottom: 16 }}>Prevention</div>
                        <div style={{ display: "flex", gap: 12, padding: "8px 0" }}>
                            <div style={{ width: 6, height: 6, background: "#0D9488", borderRadius: "50%", marginTop: 6 }} />
                            <span style={{ fontSize: 14, lineHeight: 1.5 }}>{result.prevention}</span>
                        </div>
                    </div>

                    <div style={{ display: "flex", gap: 12 }}>
                        <button onClick={() => { if (navigator.share) navigator.share({ title: `PlantDoc: ${result.disease}`, text: `Detected ${result.disease} on ${result.cropName}` }); else showToast("Share not supported", "default"); }} style={{ flex: 1, padding: "12px", borderRadius: 14, border: "1.5px solid #E2E8F0", background: "white", fontWeight: 600, cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center", gap: 6 }}><Icon name="share" size={16} /> Share</button>
                        <button onClick={onReset} style={{ flex: 2, padding: "12px", borderRadius: 14, border: "none", background: "#0D9488", color: "white", fontWeight: 600, cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center", gap: 6 }}><Icon name="camera" size={16} /> New Diagnosis</button>
                    </div>
                </div>
            );
        };

        // History Page
        const HistoryPage = ({ history, setHistory, showToast }) => {
            const [selected, setSelected] = useState(null);
            if (selected) {
                return (
                    <div>
                        <button onClick={() => setSelected(null)} style={{ display: "flex", alignItems: "center", gap: 6, background: "none", border: "none", padding: "8px 0", marginBottom: 16, fontSize: 14, fontWeight: 500, color: "#0D9488", cursor: "pointer" }}>← Back to History</button>
                        <ResultView result={selected} onReset={() => setSelected(null)} showToast={showToast} />
                    </div>
                );
            }
            if (history.length === 0) {
                return (
                    <div style={{ textAlign: "center", padding: "60px 20px" }}>
                        <div style={{ fontSize: 64, marginBottom: 16 }}>📋</div>
                        <div style={{ fontSize: 18, fontWeight: 700, marginBottom: 6 }}>No diagnoses yet</div>
                        <div style={{ fontSize: 14, color: "#64748B" }}>Run your first AI diagnosis to see results here</div>
                    </div>
                );
            }
            return (
                <div>
                    <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16 }}>
                        <div style={{ fontSize: 12, fontWeight: 700, color: "#475569", textTransform: "uppercase" }}>Recent Diagnoses ({history.length})</div>
                        <button onClick={() => { if (confirm("Clear all history?")) { setHistory([]); localStorage.setItem("plantdoc_history", "[]"); showToast("History cleared", "success"); } }} style={{ fontSize: 12, color: "#EF4444", background: "none", border: "none", cursor: "pointer" }}>Clear All</button>
                    </div>
                    {history.map(entry => (
                        <div key={entry.timestamp} onClick={() => setSelected(entry)} style={{ display: "flex", gap: 14, padding: "14px 0", borderBottom: "1px solid #F1F5F9", cursor: "pointer" }}>
                            <img src={entry.imagePreview} style={{ width: 56, height: 56, borderRadius: 14, objectFit: "cover", background: "#F1F5F9" }} />
                            <div style={{ flex: 1 }}>
                                <div style={{ fontWeight: 700, marginBottom: 4 }}>{entry.disease}</div>
                                <div style={{ fontSize: 12, color: "#64748B" }}>{entry.cropName} · {entry.confidence}%</div>
                                <div style={{ fontSize: 10, color: "#94A3B8", marginTop: 4 }}>{new Date(entry.timestamp).toLocaleDateString()}</div>
                            </div>
                        </div>
                    ))}
                </div>
            );
        };

        // Settings Page with SVG Icons for AI Providers
        const SettingsPage = ({ settings, saveSettings, showToast }) => {
            const [localSettings, setLocalSettings] = useState(settings);
            const [showKeys, setShowKeys] = useState({ openai: false, anthropic: false, gemini: false });

            const updateSetting = (key, value) => {
                const updated = { ...localSettings, [key]: value };
                setLocalSettings(updated);
                saveSettings(updated);
                showToast(`${key} updated`, "success");
            };

            const updateApiKey = (provider, value) => {
                const updated = { ...localSettings, apiKeys: { ...localSettings.apiKeys, [provider]: value } };
                setLocalSettings(updated);
                saveSettings(updated);
                showToast(`${provider} API key saved`, "success");
            };

            return (
                <div className="fade-in">
                    {/* AI Model Selection */}
                    <div style={{ background: "white", borderRadius: 20, padding: 20, marginBottom: 16, border: "1px solid #F1F5F9" }}>
                        <div style={{ fontSize: 12, fontWeight: 700, color: "#475569", textTransform: "uppercase", marginBottom: 16, display: "flex", alignItems: "center", gap: 6 }}>
                            <Icon name="brain" size={14} /> AI Engine
                        </div>
                        <select value={localSettings.activeAI} onChange={e => updateSetting("activeAI", e.target.value)} style={{ width: "100%", padding: "12px", borderRadius: 12, border: "1.5px solid #E2E8F0", fontFamily: "Inter", fontSize: 14, marginBottom: 8 }}>
                            <option value="teachable">🌿 Teachable Machine (Free, Built-in)</option>
                            <option value="openai">🤖 OpenAI GPT-4</option>
                            <option value="anthropic">🧠 Anthropic Claude</option>
                            <option value="gemini">⭐ Google Gemini</option>
                        </select>
                        <div style={{ fontSize: 11, color: "#64748B", marginTop: 8 }}>Teachable Machine is pre-configured and works out of the box.</div>
                    </div>

                    {/* API Keys Section with SVG Icons */}
                    <div style={{ background: "white", borderRadius: 20, padding: 20, marginBottom: 16, border: "1px solid #F1F5F9" }}>
                        <div style={{ fontSize: 12, fontWeight: 700, color: "#475569", textTransform: "uppercase", marginBottom: 16, display: "flex", alignItems: "center", gap: 6 }}>
                            <Icon name="key" size={14} /> API Keys (Optional)
                        </div>
                        
                        {/* OpenAI with SVG */}
                        <div style={{ marginBottom: 16, padding: 12, background: "#F8FAFC", borderRadius: 12 }}>
                            <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 10 }}>
                                <div style={{ width: 28, height: 28 }} dangerouslySetInnerHTML={{ __html: AIProviderIcons.openai }} />
                                <span style={{ fontWeight: 600, fontSize: 13 }}>OpenAI</span>
                            </div>
                            <div style={{ display: "flex", gap: 8 }}>
                                <input type={showKeys.openai ? "text" : "password"} placeholder="sk-..." value={localSettings.apiKeys.openai} onChange={e => updateApiKey("openai", e.target.value)} style={{ flex: 1, padding: "10px", borderRadius: 10, border: "1.5px solid #E2E8F0", fontSize: 13, fontFamily: "monospace" }} />
                                <button onClick={() => setShowKeys({...showKeys, openai: !showKeys.openai})} style={{ padding: "0 12px", borderRadius: 10, border: "1.5px solid #E2E8F0", background: "white", cursor: "pointer", fontWeight: 500 }}>{showKeys.openai ? "Hide" : "Show"}</button>
                            </div>
                            <div style={{ fontSize: 10, color: "#94A3B8", marginTop: 8 }}>Get key from platform.openai.com/api-keys</div>
                        </div>

                        {/* Anthropic with SVG */}
                        <div style={{ marginBottom: 16, padding: 12, background: "#F8FAFC", borderRadius: 12 }}>
                            <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 10 }}>
                                <div style={{ width: 28, height: 28 }} dangerouslySetInnerHTML={{ __html: AIProviderIcons.anthropic }} />
                                <span style={{ fontWeight: 600, fontSize: 13 }}>Anthropic Claude</span>
                            </div>
                            <div style={{ display: "flex", gap: 8 }}>
                                <input type={showKeys.anthropic ? "text" : "password"} placeholder="sk-ant-..." value={localSettings.apiKeys.anthropic} onChange={e => updateApiKey("anthropic", e.target.value)} style={{ flex: 1, padding: "10px", borderRadius: 10, border: "1.5px solid #E2E8F0", fontSize: 13, fontFamily: "monospace" }} />
                                <button onClick={() => setShowKeys({...showKeys, anthropic: !showKeys.anthropic})} style={{ padding: "0 12px", borderRadius: 10, border: "1.5px solid #E2E8F0", background: "white", cursor: "pointer", fontWeight: 500 }}>{showKeys.anthropic ? "Hide" : "Show"}</button>
                            </div>
                            <div style={{ fontSize: 10, color: "#94A3B8", marginTop: 8 }}>Get key from console.anthropic.com</div>
                        </div>

                        {/* Google Gemini with SVG */}
                        <div style={{ padding: 12, background: "#F8FAFC", borderRadius: 12 }}>
                            <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 10 }}>
                                <div style={{ width: 28, height: 28 }} dangerouslySetInnerHTML={{ __html: AIProviderIcons.gemini }} />
                                <span style={{ fontWeight: 600, fontSize: 13 }}>Google Gemini</span>
                            </div>
                            <div style={{ display: "flex", gap: 8 }}>
                                <input type={showKeys.gemini ? "text" : "password"} placeholder="AIza..." value={localSettings.apiKeys.gemini} onChange={e => updateApiKey("gemini", e.target.value)} style={{ flex: 1, padding: "10px", borderRadius: 10, border: "1.5px solid #E2E8F0", fontSize: 13, fontFamily: "monospace" }} />
                                <button onClick={() => setShowKeys({...showKeys, gemini: !showKeys.gemini})} style={{ padding: "0 12px", borderRadius: 10, border: "1.5px solid #E2E8F0", background: "white", cursor: "pointer", fontWeight: 500 }}>{showKeys.gemini ? "Hide" : "Show"}</button>
                            </div>
                            <div style={{ fontSize: 10, color: "#94A3B8", marginTop: 8 }}>Get key from aistudio.google.com</div>
                        </div>
                        
                        <div style={{ fontSize: 11, color: "#64748B", marginTop: 12, textAlign: "center" }}>API keys are stored locally in your browser. Teachable Machine works without any key.</div>
                    </div>

                    {/* Location */}
                    <div style={{ background: "white", borderRadius: 20, padding: 20, marginBottom: 16, border: "1px solid #F1F5F9" }}>
                        <div style={{ fontSize: 12, fontWeight: 700, color: "#475569", textTransform: "uppercase", marginBottom: 16, display: "flex", alignItems: "center", gap: 6 }}>
                            <Icon name="location" size={14} /> Location
                        </div>
                        <select value={localSettings.province} onChange={e => updateSetting("province", e.target.value)} style={{ width: "100%", padding: "12px", borderRadius: 12, border: "1.5px solid #E2E8F0", fontFamily: "Inter", fontSize: 14, marginBottom: 12 }}>
                            {ZAMBIAN_PROVINCES.map(p => <option key={p}>{p} Province</option>)}
                        </select>
                        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", paddingTop: 8 }}>
                            <span style={{ fontSize: 13, fontWeight: 500 }}>Save GPS Location</span>
                            <button onClick={() => updateSetting("saveLocation", !localSettings.saveLocation)} style={{ width: 44, height: 24, borderRadius: 12, background: localSettings.saveLocation ? "#0D9488" : "#E2E8F0", border: "none", cursor: "pointer", position: "relative", transition: "background 0.2s" }}>
                                <span style={{ position: "absolute", width: 18, height: 18, background: "white", borderRadius: "50%", top: 3, left: localSettings.saveLocation ? 23 : 3, transition: "left 0.2s" }} />
                            </button>
                        </div>
                    </div>

                    <div style={{ textAlign: "center", fontSize: 11, color: "#94A3B8", padding: "20px 0" }}>
                        PlantDoc Pro v4.0 · AI-powered crop diagnosis for Zambia
                    </div>
                </div>
            );
        };

        ReactDOM.createRoot(document.getElementById("root")).render(<PlantDocZambia />);
    </script>
</body>
</html>
